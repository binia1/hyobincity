<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>민원 접수 - 효빈광역시 버스</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style> body { font-family: 'Noto Sans KR', sans-serif; } </style>
</head>
<body class="bg-slate-50 flex flex-col min-h-screen">

    <!-- 상단 네비게이션 -->
    <header class="border-b border-gray-200 sticky top-0 bg-white z-50">
        <div class="max-w-3xl mx-auto px-4 h-16 flex justify-between items-center">
            <a href="#" onclick="history.back()" class="text-slate-500 hover:text-blue-600 transition flex items-center gap-1 text-sm font-bold">
                <i data-lucide="arrow-left" class="w-5 h-5"></i> 이전 페이지
            </a>
            <h1 class="text-lg font-bold text-slate-800">민원 접수</h1>
            <div class="w-16"></div> <!-- 여백용 더미 -->
        </div>
    </header>

    <!-- 메인 컨텐츠 -->
    <main class="max-w-3xl mx-auto px-4 py-8 flex-grow w-full">
        
        <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-6 md:p-8">
            <h2 class="text-2xl font-black text-slate-800 mb-2">고객의 소리 (VOC)</h2>
            <p class="text-slate-500 text-sm mb-8">고객님의 소중한 의견을 귀담아듣겠습니다.</p>

            <form id="complaintForm" class="space-y-6">
                <!-- 민원 대상 업체 -->
                <div>
                    <label class="block text-sm font-bold text-slate-700 mb-2">대상 운수업체 <span class="text-red-500">*</span></label>
                    <select id="company-select" required class="w-full px-4 py-3 rounded-lg border border-slate-300 focus:border-blue-500 focus:ring-2 focus:ring-blue-200 transition outline-none appearance-none bg-white">
                        <option value="">업체를 선택해주세요</option>
                        <option value="칠양여객">칠양여객</option>
                        <option value="효빈여객">효빈여객</option>
                        <option value="소진여객">소진여객</option>
                        <option value="청엽여객">청엽여객</option>
                        <option value="송포여객">송포여객</option>
                        <option value="입포여객">입포여객</option>
                        <option value="임천여객">임천여객</option>
                        <option value="이자여객">이자여객</option>
                        <option value="창전여객">창전여객</option>
                        <option value="판주여객">판주여객</option>
                        <option value="효안교통">효안교통</option>
                        <option value="내삼여객">내삼여객</option>
                        <option value="월주여객">월주여객</option>
                        <option value="중성여객">중성여객</option>
                        <option value="남주여객">남주여객</option>
                        <option value="오진여객">오진여객</option>
                        <option value="청선여객">청선여객</option>
                        <option value="탄성여객">탄성여객</option>
                        <option value="안천고속">안천고속</option>
                        <option value="덕빈고속">덕빈고속</option>
                        <option value="대교여객">대교여객</option>
                    </select>
                </div>

                <!-- 민원 유형 -->
                <div>
                    <label class="block text-sm font-bold text-slate-700 mb-2">민원 유형 <span class="text-red-500">*</span></label>
                    <div class="grid grid-cols-2 md:grid-cols-4 gap-3">
                        <label class="cursor-pointer">
                            <input type="radio" name="type" value="친절" class="peer sr-only" checked>
                            <div class="px-4 py-3 rounded-lg border border-slate-200 text-center text-sm font-medium peer-checked:bg-blue-50 peer-checked:border-blue-500 peer-checked:text-blue-700 hover:bg-slate-50 transition">
                                😊 친절/칭찬
                            </div>
                        </label>
                        <label class="cursor-pointer">
                            <input type="radio" name="type" value="불친절" class="peer sr-only">
                            <div class="px-4 py-3 rounded-lg border border-slate-200 text-center text-sm font-medium peer-checked:bg-red-50 peer-checked:border-red-500 peer-checked:text-red-700 hover:bg-slate-50 transition">
                                😠 불친절
                            </div>
                        </label>
                        <label class="cursor-pointer">
                            <input type="radio" name="type" value="안전" class="peer sr-only">
                            <div class="px-4 py-3 rounded-lg border border-slate-200 text-center text-sm font-medium peer-checked:bg-orange-50 peer-checked:border-orange-500 peer-checked:text-orange-700 hover:bg-slate-50 transition">
                                ⚠️ 난폭운전
                            </div>
                        </label>
                        <label class="cursor-pointer">
                            <input type="radio" name="type" value="기타" class="peer sr-only">
                            <div class="px-4 py-3 rounded-lg border border-slate-200 text-center text-sm font-medium peer-checked:bg-gray-50 peer-checked:border-gray-500 peer-checked:text-gray-700 hover:bg-slate-50 transition">
                                📝 기타문의
                            </div>
                        </label>
                    </div>
                </div>

                <!-- 제목 -->
                <div>
                    <label class="block text-sm font-bold text-slate-700 mb-2">제목 <span class="text-red-500">*</span></label>
                    <input type="text" required placeholder="민원 제목을 입력해주세요" class="w-full px-4 py-3 rounded-lg border border-slate-300 focus:border-blue-500 focus:ring-2 focus:ring-blue-200 transition outline-none">
                </div>

                <!-- 내용 -->
                <div>
                    <label class="block text-sm font-bold text-slate-700 mb-2">내용 <span class="text-red-500">*</span></label>
                    <textarea required rows="6" placeholder="차량번호, 발생 일시, 장소 등을 상세히 기재해주시면 처리에 도움이 됩니다." class="w-full px-4 py-3 rounded-lg border border-slate-300 focus:border-blue-500 focus:ring-2 focus:ring-blue-200 transition outline-none resize-none"></textarea>
                </div>

                <!-- 작성자 정보 -->
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label class="block text-sm font-bold text-slate-700 mb-2">작성자명 <span class="text-red-500">*</span></label>
                        <input type="text" required class="w-full px-4 py-3 rounded-lg border border-slate-300 focus:border-blue-500 focus:ring-2 focus:ring-blue-200 transition outline-none">
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-slate-700 mb-2">연락처 <span class="text-red-500">*</span></label>
                        <input type="tel" required placeholder="010-0000-0000" class="w-full px-4 py-3 rounded-lg border border-slate-300 focus:border-blue-500 focus:ring-2 focus:ring-blue-200 transition outline-none">
                    </div>
                </div>

                <!-- 개인정보 동의 -->
                <div class="flex items-start gap-3 pt-4 border-t border-slate-100">
                    <input type="checkbox" id="agree" required class="mt-1 w-4 h-4 text-blue-600 rounded border-gray-300 focus:ring-blue-500">
                    <label for="agree" class="text-sm text-slate-600">
                        [필수] 민원 처리를 위한 개인정보 수집 및 이용에 동의합니다.
                        <span class="block text-xs text-slate-400 mt-1">수집 항목: 이름, 연락처 / 보유 기간: 민원 처리 완료 후 3년</span>
                    </label>
                </div>

                <!-- 버튼 -->
                <div class="pt-6">
                    <button type="submit" class="w-full bg-slate-800 text-white py-4 rounded-xl font-bold text-lg hover:bg-slate-900 transition shadow-lg flex items-center justify-center gap-2">
                        <i data-lucide="send" class="w-5 h-5"></i> 민원 접수하기
                    </button>
                </div>
            </form>
        </div>
    </main>

    <!-- 푸터 -->
    <footer class="bg-slate-900 text-slate-400 py-8 text-sm text-center">
        <div class="max-w-3xl mx-auto px-4">
            <p class="font-bold text-white mb-2">효빈광역시 버스운송사업조합 고객센터</p>
            <p>본 페이지는 효빈광역시 버스 이용 불편 신고를 위해 운영됩니다.</p>
            <p class="mt-4 text-xs opacity-50">COPYRIGHT © 2026 HYOBIN CITY BUS ASSOCIATION. ALL RIGHTS RESERVED.</p>
        </div>
    </footer>

    <script>
        lucide.createIcons();

        // URL 파라미터에서 회사 이름 가져와서 자동 선택
        const urlParams = new URLSearchParams(window.location.search);
        const companyName = urlParams.get('name');
        
        if (companyName) {
            const select = document.getElementById('company-select');
            const options = Array.from(select.options);
            const matchedOption = options.find(opt => opt.value === companyName);
            
            if (matchedOption) {
                select.value = companyName;
            }
        }

        // 폼 제출 이벤트 처리
        document.getElementById('complaintForm').addEventListener('submit', (e) => {
            e.preventDefault();
            
            const selectedCompany = document.getElementById('company-select').value;
            
            if(!selectedCompany) {
                alert('민원 대상 업체를 선택해주세요.');
                return;
            }

            // 접수 완료 알림
            alert(`[접수 완료]\n\n${selectedCompany}에 대한 민원이 정상적으로 접수되었습니다.\n담당자 확인 후 연락처로 답변 드리겠습니다.`);
            
            // 이전 페이지로 이동 (또는 메인으로 이동)
            history.back();
        });
    </script>
</body>
</html>
