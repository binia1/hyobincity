<!DOCTYPE html>
<html lang="ko">
<head>
    <link rel="icon" href="이미지/logo.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VR 투어 - 효빈광역시</title>
    <!-- CSS 및 라이브러리 로드 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- VR 라이브러리 (Pannellum) -->
    <link rel="stylesheet" href="https://cdn.pannellum.org/2.5/pannellum.css"/>
    <script type="text/javascript" src="https://cdn.pannellum.org/2.5/pannellum.js"></script>
    <style> 
        body { font-family: 'Noto Sans KR', sans-serif; }
        .pnlm-container { border-radius: 1.5rem; } /* 뷰어 둥글게 */
    </style>
</head>
<body class="bg-slate-950 min-h-screen flex flex-col text-white">
    <!-- 헤더 -->
    <div id="common-header"></div>

    <main class="flex-grow p-4 md:p-12">
        <div class="max-w-6xl mx-auto">
            <div class="flex flex-col md:flex-row justify-between items-end mb-10 gap-6">
                <div>
                    <h1 class="text-5xl font-black mb-3 bg-gradient-to-r from-blue-400 to-purple-500 bg-clip-text text-transparent">HYOBIN VR TOUR</h1>
                    <p class="text-slate-400 text-lg">마우스로 드래그하여 효빈시의 명소를 360도로 둘러보세요.</p>
                </div>
            </div>

            <!-- VR 뷰어 컨테이너 -->
            <div class="grid grid-cols-1 lg:grid-cols-4 gap-8">
                <div class="lg:col-span-3">
                    <div id="panorama" class="w-full aspect-video shadow-2xl border border-slate-700 bg-black"></div>
                </div>

                <!-- 코스 선택 -->
                <div class="lg:col-span-1 space-y-4">
                    <h3 class="font-bold text-slate-400 text-sm uppercase tracking-widest mb-4">추천 투어 코스</h3>
                    <div class="space-y-3">
                        <button onclick="window.initVR('HAF')" class="w-full text-left bg-slate-800 p-4 rounded-xl border border-slate-700 hover:border-purple-500 transition">
                            <div class="font-bold">🎡 HAF 2025 현장</div>
                        </button>
                        <button onclick="window.initVR('Harbor')" class="w-full text-left bg-slate-800 p-4 rounded-xl border border-slate-700 hover:border-blue-500 transition">
                            <div class="font-bold">🌊 효빈항 야경</div>
                        </button>
                        <button onclick="window.initVR('CityHall')" class="w-full text-left bg-slate-800 p-4 rounded-xl border border-slate-700 hover:border-green-500 transition">
                            <div class="font-bold">🏛 효빈광역시청 전경</div>
                        </button>
                        <button onclick="window.initVR('Farm')" class="w-full text-left bg-slate-800 p-4 rounded-xl border border-slate-700 hover:border-orange-500 transition">
                            <div class="font-bold">🍊 탄성군 감귤농장</div>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <div id="common-footer"></div>
    <div id="common-modals"></div>

    <script>
        // 에러를 방지하고 순서를 제어하는 초기화 로직
        (function() {
            window.initVR = function(id) {
                try {
                    // Pannellum 뷰어 생성 (PNG 사용)
                    pannellum.viewer('panorama', {
                        "type": "equirectangular",
                        "panorama": `이미지/vr_${id}.png`,
                        "autoLoad": true,
                        "showZoomCtrl": true,
                        "showFullscreenCtrl": true,
                        "hfov": 110
                    });
                } catch(e) {
                    console.error("VR 로드 실패 (이미지 경로/형식 확인):", e);
                }
            };

            // 페이지 완전 로드 후 첫 VR 실행
            window.addEventListener('load', () => {
                window.initVR('HAF'); // 기본 코스
                if (typeof lucide !== 'undefined') lucide.createIcons();
            });
        })();
    </script>
    
    <!-- 외부 파일 로드 (만약 이게 문제라면 주석 처리 하세요) -->
    <script src="data.js"></script>
    <script src="script.js"></script>
    <script src="common121.js"></script>
</body>
</html>
