    <script>
        // 효빈광역시 설정 기반 브리핑 데이터 (총 25건 상세 확충)
        const briefingData = [
            {
                id: 25,
                category: "해명/반박",
                title: "['글로벌 IP 래핑 버스 예산 낭비' 관련 일부 언론 보도에 대한 효빈시의 입장]",
                dept: "대변인실",
                manager: "홍보담당관",
                date: "2026.04.18",
                views: 5450,
                content: `[해명자료] 글로벌 IP 래핑 버스는 예산 낭비가 아닌 '황금알을 낳는 거위'입니다.

최근 일부 언론에서 보도된 "효빈시 시내버스 글로벌 IP(부시로드, 선라이즈 등) 라이선스 체결 및 래핑 비용에 과도한 시 예산이 낭비되고 있다"는 주장에 대하여 객관적 지표를 바탕으로 다음과 같이 바로잡습니다.

1. 로열티 지급 대비 압도적 경제적 파급 효과
효빈광역시는 정식 업무 협약을 통해 글로벌 IP를 도입하였으며, 초기 라이선스 계약금 및 차량 래핑 비용으로 약 15억 원이 소요된 것은 사실입니다. 그러나 해당 차량 운행 및 '파스텔 블루 거리(L-Project)' 연계 이후, 전국 및 해외에서 몰려든 성지순례 관광객으로 인해 관련 지역 상권 매출이 전년 대비 420% 폭증하였습니다. 

2. 세수 증대 및 대중교통 운송수입 흑자 전환
현재 래핑 버스 운행 노선의 탑승객 수는 비래핑 노선 대비 18% 높게 나타나고 있습니다. 이에 따른 대중교통 운송 수입금 증가분과 효빈교통공사가 독점 기획한 '한정판 콜라보 교통카드 및 굿즈' 판매 수익만으로도 이미 누적 로열티 지급액의 3.5배를 환수하며 흑자 전환을 달성하였습니다.

효빈시는 이를 단순한 '비용'이 아닌, 쇠퇴하던 지역 경제 부활을 이끈 가장 성공적인 '문화 복지 투자'로 평가하고 있습니다. 시민 여러분께서는 악의적인 프레임 씌우기식 비방 보도에 흔들림 없이 효빈의 문화 정책을 지지해 주시기를 당부드립니다.`
            },
            {
                id: 24,
                category: "정책발표",
                title: "[7호선(노면전차) 심야 연장 운행 전격 시행... 밤 1시까지 달린다]",
                dept: "대중교통과",
                manager: "도시철도운영팀",
                date: "2026.04.15",
                views: 5120,
                content: `[보도자료] 효빈의 상징 7호선 노면전차, 시민의 밤을 가장 안전하게 지킵니다.

효빈교통공사는 시민들의 지속적인 심야 교통 편의 확충 건의를 적극 수용하여, 대한민국 근대 교통의 살아있는 상징인 7호선(노면전차)의 심야 연장 운행을 전격 시행합니다.

■ 시행 일자: 2026년 4월 15일 (수) 부터 전면 시행
■ 연장 내용: 막차 운행 종료 시간 기존 23:30 → 익일 01:00 (1시간 30분 연장)
■ 연계 교통망: 종착역 하차 시 '심야 안심 귀가 버스(N1~N4)' 노선과 대기 시간 없이 즉시 환승 가능하도록 타임테이블 조정 완료.

박효빈 시장은 "과거 폐선 위기에 처했던 7호선 전차가 시민의 뜨거운 연대로 살아남아, 이제는 심야 퇴근길 시민들의 가장 든든한 발이 되었다"며, "앞으로도 시민의 일상과 직결된 대중교통의 공공성을 최우선 과제로 삼아 정책을 추진하겠다"고 밝혔습니다.`
            },
            {
                id: 23,
                category: "행사/동정",
                title: "[박효빈 시장, '효빈 컬쳐레스풀' 개관 3주년 기념 현장 간담회 참석]",
                dept: "문화체육관광국",
                manager: "문화기반조성팀",
                date: "2026.04.14",
                views: 2890,
                content: `[동정자료] "부패의 웅덩이에서 창조의 둥지로, 청년들의 쉼표를 응원합니다."

                dept: "경제일자리과",

                content: `[시정소식] 효빈의 맛과 멋, 이제 전국 어디서나 안방에서 편하게 클릭하세요!

        let activeCategory = 'all';
        let currentKeyword = '';
        let currentPage = 1;
        const itemsPerPage = 8;
        let filteredData = [];

        // 뱃지 스타일 매핑 함수
        function getBadgeClass(category) {
            switch(category) {
                case '시정소식': return 'badge-news';
                case '정책발표': return 'badge-policy';
                case '해명/반박': return 'badge-clarify';
                case '행사/동정': return 'badge-event';
                default: return 'bg-slate-200 text-slate-700 border-slate-300';
            }
        }

        // 초기화
        document.addEventListener('DOMContentLoaded', () => {
            setupFilterButtons();
            filterBriefings();
        });

        // 필터 버튼 이벤트 셋업
        function setupFilterButtons() {
            const buttons = document.querySelectorAll('.filter-btn');
            buttons.forEach(btn => {
                btn.addEventListener('click', (e) => {
                    // 활성 상태 스타일 변경
                    buttons.forEach(b => {
                        b.classList.remove('bg-hyobin-dark', 'text-white');
                        b.classList.add('bg-white', 'text-slate-600', 'border-slate-300');
                    });
                    e.target.classList.remove('bg-white', 'text-slate-600', 'border-slate-300');
                    e.target.classList.add('bg-hyobin-dark', 'text-white');
                    
                    activeCategory = e.target.dataset.category;
                    filterBriefings(); 
                });
            });
        }

        // 검색 및 필터링 적용 로직
        function filterBriefings() {
            const searchType = document.getElementById('search-type').value;
            currentKeyword = document.getElementById('search-input').value.toLowerCase();
            
            filteredData = briefingData.filter(item => {
                // 카테고리 필터
                const matchCategory = activeCategory === 'all' || item.category === activeCategory;
                
                // 검색어 필터
                let matchKeyword = true;
                if(currentKeyword !== '') {
                    if(searchType === 'title') {
                        matchKeyword = item.title.toLowerCase().includes(currentKeyword);
                    } else if(searchType === 'dept') {
                        matchKeyword = item.dept.toLowerCase().includes(currentKeyword);
                    } else if(searchType === 'content') {
                        matchKeyword = item.content.toLowerCase().includes(currentKeyword);
                    }
                }
                
                return matchCategory && matchKeyword;
            });

            currentPage = 1; 
            renderBoard();
        }

        // 게시판 렌더링 (페이지네이션 적용)
        function renderBoard() {
            const tbody = document.getElementById('board-tbody');
            tbody.innerHTML = '';
            
            if (filteredData.length === 0) {
                tbody.innerHTML = `<tr><td colspan="6" class="py-10 text-center text-slate-500 font-medium">해당 조건의 브리핑 자료가 없습니다.</td></tr>`;
                renderPagination();
                return;
            }

            // 페이지 데이터 슬라이싱
            const startIndex = (currentPage - 1) * itemsPerPage;
            const endIndex = startIndex + itemsPerPage;
            const pageData = filteredData.slice(startIndex, endIndex);

            pageData.forEach(item => {
                const badgeClass = getBadgeClass(item.category);
                const tr = document.createElement('tr');
                tr.className = "hover:bg-slate-50 transition cursor-pointer";
                tr.onclick = () => openBriefingModal(item.id);
                
                tr.innerHTML = `
                    <td>${item.id}</td>
                    <td><span class="badge-common ${badgeClass}">${item.category}</span></td>
                    <td class="title-col font-bold text-slate-800 hover:text-hyobin-blue transition truncate max-w-xs md:max-w-md">${item.title}</td>
                    <td class="text-sm font-medium">${item.dept}</td>
                    <td class="text-sm">${item.date}</td>
                    <td class="text-sm">${item.views.toLocaleString()}</td>
                `;
                tbody.appendChild(tr);
            });

            if (typeof lucide !== 'undefined') lucide.createIcons();
            renderPagination(); 
        }

        // 페이지네이션 렌더링 로직
        function renderPagination() {
            const container = document.getElementById('pagination-container');
            container.innerHTML = '';
            
            const totalPages = Math.ceil(filteredData.length / itemsPerPage);
            if (totalPages <= 1) return; // 1페이지 이하면 버튼 숨김

            const nav = document.createElement('nav');
            nav.className = "flex items-center gap-1.5";

            // 버튼 생성 헬퍼
            const createBtn = (text, targetPage, isDisabled, isActive) => {
                const btn = document.createElement('button');
                btn.innerHTML = text;
                btn.disabled = isDisabled;
                
                if (isActive) {
                    btn.className = 'w-9 h-9 rounded bg-hyobin-dark text-white font-bold flex items-center justify-center shadow-md';
                } else if (isDisabled) {
                    btn.className = 'w-9 h-9 rounded border border-slate-200 text-slate-300 bg-slate-50 flex items-center justify-center cursor-not-allowed';
                } else {
                    btn.className = 'w-9 h-9 rounded border border-slate-200 bg-white hover:bg-slate-100 text-slate-600 flex items-center justify-center transition font-medium';
                }
                
                if (!isDisabled) {
                    btn.onclick = () => {
                        currentPage = targetPage;
                        renderBoard();
                        // 페이지 전환 시 스크롤 상단으로 부드럽게 이동
                        document.querySelector('.board-container').scrollIntoView({ behavior: 'smooth', block: 'end' });
                    };
                }
                return btn;
            };

            nav.appendChild(createBtn('<i data-lucide="chevron-left" class="w-4 h-4"></i>', currentPage - 1, currentPage === 1, false));
            for (let i = 1; i <= totalPages; i++) {
                nav.appendChild(createBtn(i, i, false, i === currentPage));
            }
            nav.appendChild(createBtn('<i data-lucide="chevron-right" class="w-4 h-4"></i>', currentPage + 1, currentPage === totalPages, false));

            container.appendChild(nav);
            if (typeof lucide !== 'undefined') lucide.createIcons();
        }

        // 브리핑 모달 열기
        function openBriefingModal(id) {
            const item = briefingData.find(d => d.id === id);
            if(!item) return;

            const badgeEl = document.getElementById('modal-category');
            badgeEl.className = `badge-common ${getBadgeClass(item.category)}`;
            badgeEl.innerText = item.category;

            document.getElementById('modal-title').innerText = item.title;
            document.getElementById('modal-dept').innerText = item.dept;
            document.getElementById('modal-manager').innerText = item.manager;
            document.getElementById('modal-date').innerText = item.date;
            document.getElementById('modal-views').innerText = item.views.toLocaleString();
            document.getElementById('modal-content').innerText = item.content;

            const modal = document.getElementById('briefing-modal');
            const content = document.getElementById('briefing-modal-content');
            
            modal.classList.remove('hidden');
            setTimeout(() => { 
                content.classList.remove('scale-95', 'opacity-0'); 
            }, 10);
            document.body.style.overflow = 'hidden';

            // 시각적 조회수 증가
            item.views++;
            renderBoard();
        }

        // 브리핑 모달 닫기
        function closeBriefingModal() {
            const modal = document.getElementById('briefing-modal');
            const content = document.getElementById('briefing-modal-content');
            
            content.classList.add('scale-95', 'opacity-0');
            setTimeout(() => { 
                modal.classList.add('hidden'); 
                document.body.style.overflow = '';
            }, 300);
        }

        // ESC 키로 모달 닫기
        document.addEventListener('keydown', function(event) {
            if (event.key === "Escape") {
                closeBriefingModal();
            }
        });
    </script>
