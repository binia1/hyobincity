            renderBoard();
        });

        // 검색 로직
        function searchBoard() {
            const type = document.getElementById('search-type').value;
            const keyword = document.getElementById('search-keyword').value.toLowerCase();
            
            filteredData = boardData.filter(item => {
                if (keyword === '') return true;
                if (type === 'all') {
                    return item.title.toLowerCase().includes(keyword) || 
                           item.dept.toLowerCase().includes(keyword) || 
                           item.category.toLowerCase().includes(keyword);
                } else if (type === 'title') {
                    return item.title.toLowerCase().includes(keyword);
                } else if (type === 'dept') {
                    return item.dept.toLowerCase().includes(keyword);
                }
                return true;
            });
            
            currentPage = 1;
            renderBoard();
        }

        // 게시판 렌더링 (페이지네이션 적용)
        function renderBoard() {
            const tbody = document.getElementById('board-tbody');
            tbody.innerHTML = '';
            
            document.getElementById('total-count').innerText = filteredData.length.toLocaleString();

            const startIdx = (currentPage - 1) * itemsPerPage;
            const endIdx = startIdx + itemsPerPage;
            const currentData = filteredData.slice(startIdx, endIdx);

            if(currentData.length === 0) {
                tbody.innerHTML = `<tr><td colspan="7" class="py-10 text-slate-500">검색 결과가 없습니다.</td></tr>`;
            } else {
                currentData.forEach(item => {
                    const tr = document.createElement('tr');
                    tr.onclick = () => openDocModal(item.id);
                    
                    tr.innerHTML = `
                        <td>${item.id}</td>
                        <td><span class="badge-category">${item.category}</span></td>
                        <td class="title-col font-bold text-slate-800 hover:text-hyobin-blue transition">${item.title}</td>
                        <td>${item.dept}</td>
                        <td><i data-lucide="file-down" class="w-4 h-4 mx-auto text-slate-400"></i></td>
                        <td>${item.date}</td>
                        <td>${item.views.toLocaleString()}</td>
                    `;
                    tbody.appendChild(tr);
                });
            }

            renderPagination();
            if (typeof lucide !== 'undefined') lucide.createIcons();
        }

        // 페이지네이션 렌더링 로직
        function renderPagination() {
            const container = document.getElementById('pagination-container');
            const totalPages = Math.ceil(filteredData.length / itemsPerPage);
            container.innerHTML = '';

            if (totalPages === 0) return;

            // 페이지 버튼 생성 헬퍼 함수
            const createBtn = (text, page, disabled, active) => {
                const btn = document.createElement('button');
                btn.innerHTML = text;
                btn.disabled = disabled;
                
                if(active) {
                    btn.className = 'w-9 h-9 mx-1 rounded bg-hyobin-dark text-white font-bold flex items-center justify-center shadow-md';
                } else if(disabled) {
                    btn.className = 'w-9 h-9 mx-1 rounded border border-slate-200 text-slate-300 bg-slate-50 flex items-center justify-center cursor-not-allowed';
                } else {
                    btn.className = 'w-9 h-9 mx-1 rounded border border-slate-200 bg-white hover:bg-slate-100 text-slate-600 flex items-center justify-center transition';
                }
                
                if(!disabled) {
                    btn.onclick = () => { 
                        currentPage = page; 
                        renderBoard(); 
                    };
                }
                return btn;
            };

            // 이전 버튼
            container.appendChild(createBtn('<i data-lucide="chevron-left" class="w-4 h-4"></i>', currentPage - 1, currentPage === 1, false));
            
            // 숫자 버튼들
            for(let i = 1; i <= totalPages; i++) {
                container.appendChild(createBtn(i, i, false, i === currentPage));
            }
            
            // 다음 버튼
            container.appendChild(createBtn('<i data-lucide="chevron-right" class="w-4 h-4"></i>', currentPage + 1, currentPage === totalPages, false));
            
            if (typeof lucide !== 'undefined') lucide.createIcons();
        }

        // 문서 모달 열기

            const item = boardData.find(d => d.id === id);

            document.getElementById('modal-category').innerText = item.category;
            document.getElementById('modal-title').innerText = item.title;
            document.getElementById('modal-dept').innerText = item.dept;
            document.getElementById('modal-date').innerText = item.date;
            document.getElementById('modal-views').innerText = item.views.toLocaleString();
            document.getElementById('modal-filename').innerText = item.filename;
            document.getElementById('modal-body').innerText = item.content;

            const modal = document.getElementById('doc-modal');
            const content = document.getElementById('doc-modal-content');
            
            modal.classList.remove('hidden');
            setTimeout(() => { 
                content.classList.remove('scale-95', 'opacity-0'); 
            }, 10);
            document.body.style.overflow = 'hidden';

            // 조회수 증가
            item.views++;
            renderBoard();
        }

        // 문서 모달 닫기
        function closeDocModal() {
            const modal = document.getElementById('doc-modal');
            const content = document.getElementById('doc-modal-content');
            
            content.classList.add('scale-95', 'opacity-0');
            setTimeout(() => { 
                modal.classList.add('hidden'); 
                document.body.style.overflow = '';
            }, 300);
        }
    </script>
