<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style> 
        body { font-family: 'Noto Sans KR', sans-serif; background-color: #f8fafc; }
        
        /* 토스트 알림 애니메이션 */
        @keyframes slideInUp {
            from { transform: translateY(100%); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        @keyframes slideOutDown {
            from { transform: translateY(0); opacity: 1; }
            to { transform: translateY(100%); opacity: 0; }
        }
        .toast-enter { animation: slideInUp 0.3s ease-out forwards; }
        .toast-leave { animation: slideOutDown 0.3s ease-in forwards; }

        /* 모달 및 드로어 애니메이션 */
        .fade-enter { opacity: 0; pointer-events: none; }
        .fade-enter-active { opacity: 1; pointer-events: auto; transition: opacity 0.3s ease; }
        .slide-right-enter { transform: translateX(100%); }
        .slide-right-active { transform: translateX(0); transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .scale-enter { transform: scale(0.95); opacity: 0; }
        .scale-active { transform: scale(1); opacity: 1; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        /* 로딩 스피너 */
        .spinner { border: 4px solid rgba(255, 255, 255, 0.3); border-radius: 50%; border-top: 4px solid #0ea5e9; width: 40px; height: 40px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>

        <div class="absolute inset-0 bg-gradient-to-t from-slate-900 via-transparent to-transparent"></div>
        <div class="absolute inset-0 flex flex-col items-center justify-center text-white z-10 px-4 text-center mt-8">

    </div>

    <!-- Main Shop Content -->

            <div class="w-full md:w-auto flex justify-end">

                    <option value="priceAsc">낮은 가격순</option>
                    <option value="priceDesc">높은 가격순</option>

        </div>

            <button onclick="closeProductModal()" class="absolute top-4 right-4 p-2 bg-slate-100 hover:bg-slate-200 rounded-full text-slate-600 transition z-10">
                <i data-lucide="x" class="w-5 h-5"></i>
            </button>
            <!-- 이미지 영역 -->

            </div>

                <button type="submit" id="submit-payment-btn" class="w-full bg-sky-500 text-white font-bold py-4 rounded-xl hover:bg-sky-600 transition shadow-lg text-lg flex justify-center items-center relative overflow-hidden group">

            { id: 8, name: '오피스 아크릴 스탠드 (시장실 비치 모델)', price: 15000, category: '생활잡화', img: '이미지/한바다_아크릴.png', badge: '', brand: '효빈시청 굿즈샵', desc: '효빈광역시청 직원들의 책상 위를 든든하게 지켜주는 투명 아크릴 스탠드입니다.', fallback: 'https://placehold.co/400x400/e2e8f0/94a3b8?text=Acrylic+Stand' },
            { id: 9, name: '한바다 일러스트 머그컵', price: 12000, category: '생활잡화', img: '이미지/한바다 머그컵.png', badge: '', brand: '효빈시청 굿즈샵', desc: '고온 소성으로 제작되어 환경호르몬 걱정 없는 안전하고 튼튼한 한바다 머그컵입니다.', fallback: 'https://placehold.co/400x400/e2e8f0/94a3b8?text=Mug+Cup' },
            { id: 10, name: '한바다 메탈 뱃지 세트 (닻 & 조개)', price: 18000, category: '생활잡화', img: '이미지/한바다 뱃지.png', badge: '소장용', brand: '효빈시청 굿즈샵', desc: '한바다의 상징인 닻과 조개 머리핀을 모티브로 한 프리미엄 메탈 뱃지 2종 세트입니다.', fallback: 'https://placehold.co/400x400/e2e8f0/94a3b8?text=Metal+Badge' },
            { id: 11, name: '한바다 게이밍 장패드 (HAF 한정판)', price: 20000, category: '생활잡화', img: '이미지/한바다 장패드.png', badge: '한정판', brand: 'HAF 오피셜', desc: '키보드와 마우스를 넉넉하게 놓을 수 있는 HAF 키비주얼 한정판 논슬립 장패드입니다.', fallback: 'https://placehold.co/400x400/e2e8f0/94a3b8?text=Desk+Pad' },
            { id: 12, name: '한바다 응원 머플러 타월', price: 15000, category: '응원도구', img: '이미지/한바다 머플러.png', badge: '', brand: 'HAF 오피셜', desc: '땀 흡수가 뛰어난 최고급 순면으로 제작된 열정적인 응원용 머플러 타월입니다.', fallback: 'https://placehold.co/400x400/e2e8f0/94a3b8?text=Towel' },
            { id: 13, name: '한바다 삼색 볼펜 세트 (3종)', price: 8000, category: '생활잡화', img: '이미지/한바다 볼펜.png', badge: '실용템', brand: '효빈시청 굿즈샵', desc: '부드러운 필기감을 자랑하며 시청 공무원들이 즐겨쓰는 오피스용 볼펜 3종 세트입니다.', fallback: 'https://placehold.co/400x400/e2e8f0/94a3b8?text=Pen+Set' },
            { id: 14, name: '한바다 다꾸용 홀로그램 스티커 팩', price: 5000, category: '생활잡화', img: '이미지/한바다 스티커.png', badge: '', brand: '효빈시청 굿즈샵', desc: '다이어리 꾸미기에 최적화된 반짝이는 홀로그램 스티커 20장 세트입니다.', fallback: 'https://placehold.co/400x400/e2e8f0/94a3b8?text=Stickers' },
            { id: 15, name: '한바다 젤리 폰케이스 (주문제작)', price: 18000, category: '생활잡화', img: '이미지/한바다 폰케이스.png', badge: '', brand: '효빈시청 굿즈샵', desc: '충격 흡수에 탁월하며 귀여운 SD 한바다가 프린팅된 투명 젤리 케이스입니다.', fallback: 'https://placehold.co/400x400/e2e8f0/94a3b8?text=Phone+Case' }
        ];

        // ================= 상태 관리 =================
        let currentCategory = '전체상품';
        let currentSort = 'new';
        let cart = []; // {product, qty}
        let selectedProductForModal = null;
        let selectedQtyForModal = 1;

        // ================= 초기화 및 렌더링 =================
        document.addEventListener('DOMContentLoaded', () => {
            renderFilters();
            renderGrid();
            lucide.createIcons();
        });

        // 화폐 포맷
        const formatMoney = (num) => num.toLocaleString('ko-KR');

        // 필터 렌더링
        function renderFilters() {
            const categories = ['전체상품', '피규어', '봉제인형', '생활잡화', '응원도구'];
            const container = document.getElementById('category-filters');
            container.innerHTML = categories.map(cat => {
                const isActive = cat === currentCategory;
                const baseClass = isActive 
                    ? 'bg-slate-800 text-white shadow-md' 
                    : 'bg-white border border-slate-200 text-slate-600 hover:border-slate-400';
                return `<button onclick="setCategory('${cat}')" class="px-5 py-2 rounded-full font-bold text-sm shrink-0 transition ${baseClass}">${cat}</button>`;
            }).join('');
        }

        // 카테고리 설정
        function setCategory(cat) {
            currentCategory = cat;
            renderFilters();
            renderGrid();
        }

        // 정렬 설정
        function handleSort() {
            currentSort = document.getElementById('sort-select').value;
            renderGrid();
        }

        // 상품 그리드 렌더링
        function renderGrid() {
            const grid = document.getElementById('product-grid');
            const noProducts = document.getElementById('no-products');
            
            let filtered = products.filter(p => currentCategory === '전체상품' || p.category === currentCategory);
            
            // 정렬
            if(currentSort === 'priceAsc') filtered.sort((a,b) => a.price - b.price);
            else if(currentSort === 'priceDesc') filtered.sort((a,b) => b.price - a.price);
            else filtered.sort((a,b) => a.id - b.id); // new

            if (filtered.length === 0) {
                grid.innerHTML = '';
                noProducts.classList.remove('hidden');
                noProducts.classList.add('flex');
            } else {
                noProducts.classList.add('hidden');
                noProducts.classList.remove('flex');
                
                grid.innerHTML = filtered.map(p => `
                    <div class="bg-white rounded-2xl border border-slate-200 overflow-hidden shadow-sm hover:shadow-xl transition duration-300 group flex flex-col cursor-pointer" onclick="openProductModal(${p.id})">
                        <div class="h-56 bg-slate-50 flex items-center justify-center p-6 relative overflow-hidden">
                            <img src="${p.img}" alt="${p.name}" class="max-h-full object-contain group-hover:scale-110 transition duration-500" onerror="this.src='${p.fallback}'">
                            ${p.badge ? `<div class="absolute top-3 left-3"><span class="bg-rose-500 text-white text-[10px] font-bold px-2 py-1 rounded shadow-sm">${p.badge}</span></div>` : ''}
                        </div>
                        <div class="p-5 flex flex-col flex-grow border-t border-slate-100 bg-white">
                            <p class="text-xs text-slate-400 mb-1 font-bold">${p.brand}</p>
                            <h3 class="font-bold text-slate-800 text-[15px] mb-2 line-clamp-2 leading-snug">${p.name}</h3>
                            <div class="mt-auto pt-3 flex items-end justify-between">
                                <p class="font-black text-xl text-slate-900">${formatMoney(p.price)}<span class="text-sm font-medium ml-0.5 text-slate-500">원</span></p>
                                <button onclick="event.stopPropagation(); quickAddToCart(${p.id})" class="w-9 h-9 rounded-full bg-slate-100 flex items-center justify-center text-slate-600 hover:bg-sky-500 hover:text-white transition">
                                    <i data-lucide="shopping-cart" class="w-4 h-4"></i>
                                </button>
                            </div>
                        </div>
                    </div>
                `).join('');
                lucide.createIcons();
            }
        }

        // ================= 상품 상세 모달 =================
        const overlay = document.getElementById('global-overlay');
        const pModal = document.getElementById('product-modal');
        const pModalContent = pModal.querySelector('div');

        function openProductModal(id) {
            selectedProductForModal = products.find(p => p.id === id);
            selectedQtyForModal = 1;
            
            const p = selectedProductForModal;
            document.getElementById('modal-img').src = p.img;
            document.getElementById('modal-img').onerror = function() { this.src = p.fallback; };
            document.getElementById('modal-brand').textContent = p.brand;
            document.getElementById('modal-name').textContent = p.name;
            document.getElementById('modal-price').textContent = `${formatMoney(p.price)}원`;
            document.getElementById('modal-desc').textContent = p.desc;
            
            updateModalTotal();

            // 버튼 이벤트 연결
            document.getElementById('modal-cart-btn').onclick = () => { addModalItemToCart(); closeProductModal(); };
            document.getElementById('modal-buy-btn').onclick = () => { addModalItemToCart(); closeProductModal(); toggleCartDrawer(); };

            overlay.classList.remove('hidden');
            pModal.classList.remove('hidden');
            // trigger reflow
            void pModal.offsetWidth;
            overlay.classList.add('fade-enter-active');
            pModalContent.classList.add('scale-active');
            document.body.style.overflow = 'hidden';
        }

        function updateModalQty(delta) {
            selectedQtyForModal += delta;
            if (selectedQtyForModal < 1) selectedQtyForModal = 1;
            updateModalTotal();
        }

        function updateModalTotal() {
            document.getElementById('modal-qty').textContent = selectedQtyForModal;
            document.getElementById('modal-total').textContent = `${formatMoney(selectedProductForModal.price * selectedQtyForModal)}원`;
        }

        function closeProductModal() {
            overlay.classList.remove('fade-enter-active');
            pModalContent.classList.remove('scale-active');
            setTimeout(() => {
                overlay.classList.add('hidden');
                pModal.classList.add('hidden');
                document.body.style.overflow = '';
            }, 300);
        }

        function closeAllModals() {
            closeProductModal();
            closeCheckoutModal();
        }

        // ================= 장바구니 로직 =================
        const cartDrawer = document.getElementById('cart-drawer');

        function quickAddToCart(id) {
            const p = products.find(p => p.id === id);
            addItemToCart(p, 1);
        }

        function addModalItemToCart() {
            addItemToCart(selectedProductForModal, selectedQtyForModal);
        }

        function addItemToCart(product, qty) {
            const existing = cart.find(item => item.product.id === product.id);
            if(existing) {
                existing.qty += qty;
            } else {
                cart.push({ product, qty });
            }
            updateCartUI();
            showToast(`${product.name}`);
        }

        function removeCartItem(id) {
            cart = cart.filter(item => item.product.id !== id);
            updateCartUI();
        }

        function updateCartUI() {
            const totalQty = cart.reduce((sum, item) => sum + item.qty, 0);
            const totalPrice = cart.reduce((sum, item) => sum + (item.product.price * item.qty), 0);
            
            // 뱃지 업데이트
            const badge = document.getElementById('cart-badge');
            badge.textContent = totalQty;
            badge.classList.add('scale-125');
            setTimeout(() => badge.classList.remove('scale-125'), 200);

            // 드로어 텍스트 업데이트
            document.getElementById('cart-subtotal').textContent = `${formatMoney(totalPrice)}원`;
            document.getElementById('cart-total').textContent = `${formatMoney(totalPrice)}원`;

            // 드로어 리스트 렌더링
            const container = document.getElementById('cart-items-container');
            if(cart.length === 0) {
                container.innerHTML = `
                    <div class="flex flex-col items-center justify-center h-full text-slate-400 py-10">
                        <i data-lucide="shopping-cart" class="w-12 h-12 mb-3 opacity-50"></i>
                        <p>장바구니가 비어있습니다.</p>
                    </div>`;
            } else {
                container.innerHTML = cart.map(item => `
                    <div class="bg-white p-4 rounded-xl border border-slate-100 flex gap-4 shadow-sm items-center">
                        <div class="w-20 h-20 bg-slate-50 rounded-lg shrink-0 flex items-center justify-center overflow-hidden">
                            <img src="${item.product.img}" class="max-h-full" onerror="this.src='${item.product.fallback}'">
                        </div>
                        <div class="flex-grow">
                            <h4 class="text-sm font-bold text-slate-800 line-clamp-1">${item.product.name}</h4>
                            <p class="text-xs text-slate-500 mb-2">수량: ${item.qty}개</p>
                            <p class="font-black text-sky-600">${formatMoney(item.product.price * item.qty)}원</p>
                        </div>
                        <button onclick="removeCartItem(${item.product.id})" class="p-2 text-slate-300 hover:text-rose-500 transition">
                            <i data-lucide="trash-2" class="w-5 h-5"></i>
                        </button>
                    </div>
                `).join('');
            }
            lucide.createIcons();
        }

        function toggleCartDrawer() {
            if(cartDrawer.classList.contains('translate-x-full')) {
                // 열기
                overlay.classList.remove('hidden');
                void overlay.offsetWidth;
                overlay.classList.add('fade-enter-active');
                cartDrawer.classList.remove('translate-x-full');
                cartDrawer.classList.add('slide-right-active');
                document.body.style.overflow = 'hidden';
            } else {
                // 닫기
                closeCartDrawer();
            }
        }

        function closeCartDrawer() {
            cartDrawer.classList.remove('slide-right-active');
            cartDrawer.classList.add('translate-x-full');
            if(document.getElementById('checkout-modal').classList.contains('hidden')) {
                overlay.classList.remove('fade-enter-active');
                setTimeout(() => {
                    overlay.classList.add('hidden');
                    document.body.style.overflow = '';
                }, 300);
            }
        }

        // 오버레이 클릭 시 장바구니도 닫힘
        overlay.addEventListener('click', () => {
            if(!cartDrawer.classList.contains('translate-x-full')) closeCartDrawer();
        });

        function showToast(itemName) {
            const toastContainer = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = 'bg-slate-800 text-white px-5 py-3 rounded-lg shadow-2xl flex items-center gap-3 toast-enter pointer-events-auto border border-slate-700';
            toast.innerHTML = `
                <div class="bg-green-500 rounded-full p-1 text-white"><i data-lucide="check" class="w-4 h-4"></i></div>
                <div><p class="text-sm font-bold w-48 truncate">${itemName}</p><p class="text-xs text-slate-300">장바구니에 담겼습니다.</p></div>
            `;
            toastContainer.appendChild(toast);
            lucide.createIcons();
            setTimeout(() => {
                toast.classList.remove('toast-enter');
                toast.classList.add('toast-leave');
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        // ================= 결제 프로세스 로직 =================
        const checkoutModal = document.getElementById('checkout-modal');
        const checkoutContent = checkoutModal.querySelector('div');

        function openCheckoutModal() {
            if(cart.length === 0) {
                alert("장바구니가 비어있습니다.");
                return;
            }
            const totalPrice = cart.reduce((sum, item) => sum + (item.product.price * item.qty), 0);
            document.getElementById('payment-btn-text').textContent = `${formatMoney(totalPrice)}원 안전하게 결제하기`;
            
            closeCartDrawer();
            
            // 모달 열기
            checkoutModal.classList.remove('hidden');
            void checkoutModal.offsetWidth;
            checkoutContent.classList.add('scale-active');
        }

        function closeCheckoutModal() {
            checkoutContent.classList.remove('scale-active');
            overlay.classList.remove('fade-enter-active');
            setTimeout(() => {
                checkoutModal.classList.add('hidden');
                overlay.classList.add('hidden');
                document.body.style.overflow = '';
                
                // 폼 초기화
                document.getElementById('checkout-form').reset();
                document.getElementById('payment-status-overlay').classList.add('hidden');
                document.getElementById('loading-view').classList.remove('hidden');
                document.getElementById('success-view').classList.add('hidden');
            }, 300);
        }

        function processPayment(e) {
            e.preventDefault();
            
            // 로딩 오버레이 띄우기
            const statusOverlay = document.getElementById('payment-status-overlay');
            const loadingView = document.getElementById('loading-view');
            const successView = document.getElementById('success-view');
            
            statusOverlay.classList.remove('hidden');
            
            // 2초 후 결제 완료 처리
            setTimeout(() => {
                loadingView.classList.add('hidden');
                successView.classList.remove('hidden');
                successView.classList.add('flex');
                
                // 가짜 주문번호 생성
                const orderNum = '2026' + Math.floor(Math.random() * 100000000).toString().padStart(8, '0');
                document.getElementById('order-number').textContent = orderNum;
                
                // 장바구니 비우기
                cart = [];
                updateCartUI();
            }, 2000);
        }

        function finishOrder() {
            closeCheckoutModal();
        }

    </script>
<script src="data.js"></script>
    <script src="script.js"></script>
    <script src="common.js"></script>
</body>
</html>
