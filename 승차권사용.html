<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>나의 승차권 - 효빈종합버스터미널</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts (Noto Sans KR) -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- QR Code Generator -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        body { font-family: 'Noto Sans KR', sans-serif; background-color: #f1f5f9; color: #334155; }
        
        .ticket-card {
            background: white;
            border-radius: 1rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
            overflow: hidden;
            position: relative;
            transition: transform 0.2s;
            cursor: pointer;
        }
        .ticket-card:active { transform: scale(0.98); }
        
        /* Expired Ticket Style */
        .ticket-card.expired {
            filter: grayscale(100%);
            opacity: 0.7;
        }
        .ticket-card.expired::after {
            content: '사용완료';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) rotate(-15deg);
            font-size: 3rem;
            font-weight: 900;
            color: rgba(0, 0, 0, 0.1);
            border: 4px solid rgba(0, 0, 0, 0.1);
            padding: 0.5rem 2rem;
            border-radius: 1rem;
            pointer-events: none;
            z-index: 10;
        }
        
        /* Perforation Effect */
        .ticket-punch-left, .ticket-punch-right {
            position: absolute;
            top: 50%;
            width: 20px;
            height: 20px;
            background-color: #f1f5f9;
            border-radius: 50%;
            transform: translateY(-50%);
            z-index: 5;
        }
        .ticket-punch-left { left: -10px; }
        .ticket-punch-right { right: -10px; }

        .modal-overlay {
            background-color: rgba(15, 23, 42, 0.85);
            backdrop-filter: blur(4px);
        }

        /* Tabs */
        .tab-btn { border-bottom: 2px solid transparent; color: #94a3b8; transition: all 0.3s; }
        .tab-btn.active { border-color: #2563eb; color: #2563eb; font-weight: 700; }
        
        /* Empty State Animation */
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }
        .animate-float { animation: float 3s ease-in-out infinite; }
    </style>
</head>
<body class="pb-20">
    
    <!-- Header -->
    <header class="bg-white shadow-sm sticky top-0 z-20">
        <div class="max-w-md mx-auto px-4 h-14 flex items-center justify-between">
            <a href="terminal.html" class="p-2 -ml-2 text-slate-600 hover:text-slate-900">
                <i data-lucide="arrow-left" class="w-6 h-6"></i>
            </a>
            <h1 class="text-lg font-bold text-slate-800">나의 승차권</h1>
            <div class="w-6"></div> <!-- Spacer -->
        </div>
        <!-- Tabs -->
        <div class="max-w-md mx-auto flex border-b border-gray-100">
            <button onclick="switchTab('active')" id="tab-active" class="flex-1 py-3 text-sm tab-btn active">이용 대기</button>
            <button onclick="switchTab('history')" id="tab-history" class="flex-1 py-3 text-sm tab-btn">이용 완료</button>
        </div>
    </header>

    <main class="max-w-md mx-auto px-4 py-6 space-y-4 min-h-[60vh]" id="ticket-container">
        <!-- 티켓 리스트가 여기에 렌더링 됩니다 -->
        <div id="ticket-list"></div>

        <!-- Empty State -->
        <div class="text-center py-20 hidden" id="empty-state">
            <div class="animate-float">
                <i data-lucide="ticket" class="w-16 h-16 mx-auto mb-4 text-slate-300"></i>
            </div>
            <p class="text-slate-500 font-medium text-lg">보유 중인 승차권이 없습니다.</p>
            <p class="text-slate-400 text-sm mb-6">새로운 여정을 시작해보세요!</p>
            <a href="terminal.html" class="inline-flex items-center px-6 py-3 bg-blue-600 hover:bg-blue-700 text-white rounded-full text-sm font-bold shadow-lg transition transform hover:-translate-y-1">
                <i data-lucide="bus" class="w-4 h-4 mr-2"></i> 예매하러 가기
            </a>
        </div>
    </main>

    <!-- Ticket Detail Modal -->
    <div id="ticket-modal" class="modal-overlay fixed inset-0 hidden flex items-center justify-center z-50 p-4" onclick="closeModal()">
        <div class="w-full max-w-[320px]" onclick="event.stopPropagation()">
            <div class="bg-white rounded-2xl overflow-hidden shadow-2xl relative transform transition-all scale-95 opacity-0" id="modal-content">
                <!-- Close Button -->
                <button onclick="closeModal()" class="absolute top-3 right-3 text-white/70 hover:text-white p-2 z-10">
                    <i data-lucide="x" class="w-6 h-6"></i>
                </button>

                <div class="bg-blue-600 p-6 text-center text-white relative overflow-hidden">
                    <div class="absolute top-0 left-0 w-full h-full bg-[url('data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iMjAiIGhlaWdodD0iMjAiIHhtbG5zPSJodHRwOi8vd3d3LnczLm9yZy8yMDAwL3N2ZyI+PGNpcmNsZSBjeD0iMiIgY3k9IjIiIHI9IjIiIGZpbGw9InJnYmEoMjU1LDI1NSwyNTUsMC4xKSIvPjwvc3ZnPg==')] opacity-30"></div>
                    <h3 class="font-black text-xl tracking-wider mb-1 relative z-10">MOBILE TICKET</h3>
                    <p class="text-xs text-blue-100 relative z-10">승차 시 QR코드를 리더기에 대주세요</p>
                </div>

                <div class="p-6">
                    <!-- Route -->
                    <div class="flex justify-between items-center mb-6">
                        <div class="text-center w-1/3">
                            <span class="text-2xl font-black text-slate-800 block truncate" id="m-origin">출발</span>
                        </div>
                        <div class="flex-1 flex justify-center">
                            <i data-lucide="chevrons-right" class="text-blue-500 w-6 h-6"></i>
                        </div>
                        <div class="text-center w-1/3">
                            <span class="text-2xl font-black text-blue-600 block truncate" id="m-dest">도착</span>
                        </div>
                    </div>
                    
                    <!-- Date & Info -->
                    <div class="text-center mb-6">
                        <div class="inline-block bg-slate-100 px-4 py-1.5 rounded-full text-sm font-bold text-slate-700 mb-2 shadow-sm border border-slate-200" id="m-date">
                            YYYY. MM. DD
                        </div>
                        <div class="text-xs text-slate-400 font-medium" id="m-company">운수회사 | 등급</div>
                    </div>

                    <!-- Seats -->
                    <div class="grid grid-cols-2 gap-0 text-center border-t border-b border-dashed border-gray-200 py-4 mb-6 relative">
                        <!-- Half circles for perforation visual inside modal -->
                        <div class="absolute top-[-10px] left-[-34px] w-5 h-5 bg-slate-800 rounded-full"></div> <!-- Modal bg context fix needed, using slate-800 simulates overlay -->
                        <div class="absolute top-[-10px] right-[-34px] w-5 h-5 bg-slate-800 rounded-full"></div>

                        <div class="border-r border-gray-100">
                            <p class="text-[10px] text-gray-400 mb-1 uppercase tracking-wide">Platform</p>
                            <p class="text-2xl font-black text-red-500" id="m-platform">0</p>
                        </div>
                        <div>
                            <p class="text-[10px] text-gray-400 mb-1 uppercase tracking-wide">Seat No</p>
                            <p class="text-2xl font-black text-slate-800" id="m-seat">0</p>
                        </div>
                    </div>

                    <!-- QR -->
                    <div class="flex flex-col items-center">
                        <div id="m-qrcode" class="p-2 border rounded-lg shadow-sm bg-white"></div>
                        <p class="mt-3 text-[10px] font-mono text-gray-400 tracking-[0.2em]" id="m-id">CODE</p>
                    </div>
                </div>
                
                <!-- Bottom Action -->
                <div class="bg-gray-50 p-4 text-center">
                     <button onclick="closeModal()" class="w-full py-3.5 bg-slate-800 hover:bg-slate-900 text-white font-bold rounded-xl shadow-lg transition transform active:scale-95">확인 완료</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        lucide.createIcons();
        
        let allTickets = [];
        let currentTab = 'active'; // 'active' or 'history'

        // Date Parser Helper
        function parseTicketDate(dateStr, timeStr) {
            // dateStr 예시: "2026. 05. 24 (일)" -> "2026/05/24"
            // timeStr 예시: "14:30"
            const datePart = dateStr.split('(')[0].trim().replace(/\./g, '/'); // 2026/05/24
            return new Date(`${datePart} ${timeStr}`);
        }

        // Load Tickets from LocalStorage
        function loadTickets() {
            const rawData = localStorage.getItem('hyobin_tickets');
            
            if (rawData) {
                allTickets = JSON.parse(rawData);
            } else {
                // Mock Data for testing (Empty LocalStorage)
                const now = new Date();
                
                // 1. Future Ticket (1 hour later)
                const future = new Date(now.getTime() + 60 * 60 * 1000);
                // 2. Past Ticket (Yesterday)
                const past = new Date(now.getTime() - 24 * 60 * 60 * 1000);

                const formatDate = (d) => `${d.getFullYear()}. ${String(d.getMonth()+1).padStart(2,'0')}. ${String(d.getDate()).padStart(2,'0')} (${['일','월','화','수','목','금','토'][d.getDay()]})`;
                const formatTime = (d) => `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;

                allTickets = [
                    {
                        id: 'MOCK-ACTIVE',
                        date: formatDate(future),
                        time: formatTime(future),
                        origin: '효빈',
                        dest: '서울(강남)',
                        company: '칠양고속',
                        grade: '우등',
                        seats: [12],
                        platform: 3
                    },
                    {
                        id: 'MOCK-EXPIRED',
                        date: formatDate(past),
                        time: formatTime(past),
                        origin: '효빈',
                        dest: '부산(노포)',
                        company: '덕빈고속',
                        grade: '일반',
                        seats: [5, 6],
                        platform: 7
                    }
                ];
            }
            
            renderTickets();
        }

        function switchTab(tab) {
            currentTab = tab;
            
            // Tab UI Update
            document.getElementById('tab-active').className = `flex-1 py-3 text-sm tab-btn ${tab === 'active' ? 'active' : ''}`;
            document.getElementById('tab-history').className = `flex-1 py-3 text-sm tab-btn ${tab === 'history' ? 'active' : ''}`;
            
            renderTickets();
        }

        function renderTickets() {
            const container = document.getElementById('ticket-list');
            const emptyState = document.getElementById('empty-state');
            container.innerHTML = '';
            
            const now = new Date();

            // Filter tickets based on time and current tab
            const filteredTickets = allTickets.filter(ticket => {
                const ticketDate = parseTicketDate(ticket.date, ticket.time);
                const isExpired = ticketDate < now;
                
                if (currentTab === 'active') return !isExpired;
                if (currentTab === 'history') return isExpired;
                return false;
            });

            // Sort: Active -> Soonest first, History -> Most recent first
            filteredTickets.sort((a, b) => {
                const dateA = parseTicketDate(a.date, a.time);
                const dateB = parseTicketDate(b.date, b.time);
                return currentTab === 'active' ? dateA - dateB : dateB - dateA;
            });

            if (filteredTickets.length === 0) {
                emptyState.classList.remove('hidden');
            } else {
                emptyState.classList.add('hidden');
                
                filteredTickets.forEach(ticket => {
                    const isExpired = currentTab === 'history';
                    
                    const card = document.createElement('div');
                    card.className = `ticket-card p-5 relative mb-4 ${isExpired ? 'expired' : ''}`;
                    card.onclick = () => showTicketDetail(ticket);
                    
                    card.innerHTML = `
                        <div class="ticket-punch-left"></div>
                        <div class="ticket-punch-right"></div>
                        
                        <div class="flex justify-between items-start mb-4">
                            <div>
                                <span class="inline-block px-2 py-0.5 rounded text-[10px] font-bold ${isExpired ? 'bg-gray-100 text-gray-500' : 'bg-blue-100 text-blue-600'} mb-1">${ticket.grade}</span>
                                <h3 class="text-lg font-bold text-slate-800">${ticket.origin} <span class="text-gray-300 mx-1">▶</span> ${ticket.dest}</h3>
                            </div>
                            <div class="text-right">
                                <div class="text-xl font-black ${isExpired ? 'text-gray-500' : 'text-blue-600'} tracking-tight">${ticket.time}</div>
                                <div class="text-xs text-gray-400">${ticket.date.split('(')[0]}</div>
                            </div>
                        </div>
                        
                        <div class="flex items-center justify-between pt-4 border-t border-dashed border-gray-100">
                            <div class="text-xs text-gray-500 flex items-center">
                                <i data-lucide="bus" class="w-3 h-3 mr-1"></i> ${ticket.company}
                            </div>
                            <div class="flex items-center space-x-3">
                                <div class="text-right">
                                    <span class="text-[10px] text-gray-400 block">승차홈</span>
                                    <span class="text-sm font-bold text-red-500">${ticket.platform}</span>
                                </div>
                                <div class="text-right pl-3 border-l">
                                    <span class="text-[10px] text-gray-400 block">좌석</span>
                                    <span class="text-sm font-bold text-slate-800">${ticket.seats.join(',')}</span>
                                </div>
                            </div>
                        </div>
                    `;
                    container.appendChild(card);
                });
            }
            lucide.createIcons();
        }

        function showTicketDetail(ticket) {
            document.getElementById('m-origin').innerText = ticket.origin;
            document.getElementById('m-dest').innerText = ticket.dest;
            document.getElementById('m-date').innerText = `${ticket.date} ${ticket.time}`;
            document.getElementById('m-company').innerText = `${ticket.company} | ${ticket.grade}`;
            document.getElementById('m-platform').innerText = ticket.platform;
            document.getElementById('m-seat').innerText = ticket.seats.join(',');
            document.getElementById('m-id').innerText = ticket.id;

            // Generate QR
            const qrContainer = document.getElementById('m-qrcode');
            qrContainer.innerHTML = '';
            new QRCode(qrContainer, {
                text: ticket.id,
                width: 140,
                height: 140
            });

            const modal = document.getElementById('ticket-modal');
            const content = document.getElementById('modal-content');
            modal.classList.remove('hidden');
            // Animation
            setTimeout(() => {
                content.classList.remove('scale-95', 'opacity-0');
            }, 10);
        }

        function closeModal() {
            const modal = document.getElementById('ticket-modal');
            const content = document.getElementById('modal-content');
            content.classList.add('scale-95', 'opacity-0');
            setTimeout(() => {
                modal.classList.add('hidden');
            }, 300);
        }

        window.onload = loadTickets;
    </script>
</body>
</html>
