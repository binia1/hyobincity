  <main class="max-w-6xl mx-auto px-4 py-6">

          <h1 class="text-xl font-extrabold text-white flex items-center gap-2">
            <i class="fa-solid fa-location-dot text-sky-400"></i>
            역 선택

          <p class="text-sm text-slate-400 mt-1">역과 출구를 선택하면 상세가 표시됩니다.</p>

          <div class="mt-4 grid gap-3">
            <label class="text-xs font-bold text-slate-300">역명</label>
            <select id="stationSelect" class="w-full rounded-lg bg-slate-900 border border-slate-700 px-3 py-2 text-slate-100 focus:outline-none focus:ring-2 focus:ring-sky-500"></select>

            <label class="text-xs font-bold text-slate-300 mt-2">출구</label>
            <select id="exitSelect" class="w-full rounded-lg bg-slate-900 border border-slate-700 px-3 py-2 text-slate-100 focus:outline-none focus:ring-2 focus:ring-sky-500"></select>

            <div class="mt-2 flex gap-2">

                <i class="fa-solid fa-copy mr-1"></i>역 링크 복사
              </button>
              <button id="copyExitLink" class="flex-1 bg-indigo-600 hover:bg-indigo-500 text-white font-bold py-2 rounded-lg">
                <i class="fa-solid fa-copy mr-1"></i>출구 링크 복사
              </button>
            </div>

            <div id="toast" class="hidden mt-3 text-sm bg-emerald-900/40 border border-emerald-700/40 text-emerald-200 rounded-lg px-3 py-2">
              복사되었습니다.
            </div>
          </div>
        </div>

        <div class="mt-4 bg-slate-800/40 border border-slate-700 rounded-xl p-4">
          <h2 class="font-extrabold text-white flex items-center gap-2">
            <i class="fa-solid fa-tags text-yellow-300"></i>자동 분류 안내
          </h2>
          <p class="text-sm text-slate-400 mt-1">
            주변시설 텍스트를 키워드로 분석해 <span class="text-slate-200 font-bold">학교/은행/공공/쇼핑/관광/의료/숙박/교통/주거/공원</span> 등으로 자동 태깅합니다.
          </p>
        </div>
      </section>

      <section class="lg:w-2/3">
        <div id="detail" class="bg-slate-800/50 border border-slate-700 rounded-xl p-5">
          <div class="flex flex-wrap items-center justify-between gap-3">
            <div>

            <div class="flex items-center gap-2 text-xs text-slate-300">

            </div>

        </div>
      </section>
    </div>

        { key:'은행',   icon:'fa-building-columns',    re: /(은행|신협|새마을금고|농협|카드|금융)/ },
        { key:'공공',   icon:'fa-landmark',            re: /(시청|구청|군청|주민센터|행정복지센터|의회|우체국|공단|공사|세무서|법원|검찰청|경찰서|소방서|보건소|지사|청사|선관위|감사원|관리사무소)/ },
        { key:'쇼핑',   icon:'fa-bag-shopping',        re: /(롯데|AK|신세계|현대백화점|백화점|마트|이마트|홈플러스|코스트코|트레이더스|다이소|몰|플라자|상가|시장|먹자골목|거리)/ },
        { key:'관광',   icon:'fa-camera-retro',        re: /(해수욕장|해변|항|터미널|공항|박물관|미술관|문화회관|개항지|구\s?세관|유적|전시장|시네마|메가박스|롯데시네마|광장|전망|리조트|성\s?북문|성\s?앞)/ },
        { key:'의료',   icon:'fa-hospital',            re: /(병원|치과|의원|한의원|약국|의료|건강보험)/ },
        { key:'숙박',   icon:'fa-hotel',               re: /(호텔|모텔|스테이|숙박)/ },
        { key:'교통',   icon:'fa-bus',                 re: /(역|환승|버스터미널|터미널|정류장|선착장|차량기지|철도|공단|공항)/ },
        { key:'주거',   icon:'fa-house',               re: /(아파트|주공|행복주택|주거|단지|푸르지오|래미안|자이|휴먼시아|리브웰|더샵|센트럴|베르디움|위브|포레나|부영)/ },
        { key:'공원',   icon:'fa-tree',                re: /(공원|산|광장|타워|호반|강변)/ },
      ];

      for (const r of rules) {
        if (r.re.test(s)) return { key:r.key, icon:r.icon };
      }
      return { key:'기타', icon:'fa-circle-question' };
    }

    function splitFacilities(raw) {
      if (!raw) return [];
      // 쉼표/중점/슬래시 기반 분리 + 공백 정리
      return raw.split(/[,，]/g).map(x => x.trim()).filter(Boolean);
    }

    // =========================================================
    // URL 파라미터 처리
    // =========================================================
    function getParams() {
      const params = new URLSearchParams(location.search);
      return {
        station: params.get('station') || '',
        exit: params.get('exit') || ''
      };
    }

    function buildUrl(station, exitNo) {
      const u = new URL(location.href);
      u.searchParams.set('station', station);
      if (exitNo !== undefined && exitNo !== null && exitNo !== '') u.searchParams.set('exit', String(exitNo));
      else u.searchParams.delete('exit');
      return u.toString();
    }

    function toast(msg) {
      const el = document.getElementById('toast');
      el.textContent = msg || '완료';
      el.classList.remove('hidden');
      clearTimeout(window.__toastTimer);
      window.__toastTimer = setTimeout(() => el.classList.add('hidden'), 1400);
    }

    async function copyText(text) {
      try {
        await navigator.clipboard.writeText(text);
        toast('복사되었습니다.');
      } catch(e) {
        // fallback
        window.prompt('아래 내용을 복사하세요', text);
      }
    }

    // =========================================================
    // 데이터 인덱싱
    // =========================================================
    const byStation = new Map(); // station -> rows
    EXIT_DATA.forEach(r => {
      if (!byStation.has(r.station)) byStation.set(r.station, []);
      byStation.get(r.station).push(r);
    });
    // station 정렬
    const stations = Array.from(byStation.keys()).sort((a,b)=>a.localeCompare(b,'ko'));

    function getStationLines(rows) {
      const set = new Set();
      rows.forEach(r => (r.lines||[]).forEach(l => set.add(l)));
      return Array.from(set).sort((a,b)=>a.localeCompare(b,'ko'));
    }

    // =========================================================
    // UI
    // =========================================================
    const stationSelect = document.getElementById('stationSelect');
    const exitSelect = document.getElementById('exitSelect');

    function fillStations(selected) {
      stationSelect.innerHTML = '';
      stations.forEach(s => {
        const opt = document.createElement('option');
        opt.value = s;
        opt.textContent = s;
        if (s === selected) opt.selected = true;
        stationSelect.appendChild(opt);
      });
    }

    function fillExits(station, selectedExit) {
      const rows = (byStation.get(station) || []).slice().sort((a,b)=>a.exit_no-b.exit_no);
      const exits = rows.map(r => r.exit_no);
      exitSelect.innerHTML = '';
      exits.forEach(no => {
        const opt = document.createElement('option');
        opt.value = String(no);
        opt.textContent = `${no}번 출구`;
        if (String(no) === String(selectedExit)) opt.selected = true;
        exitSelect.appendChild(opt);
      });
    }

    function renderDetail(station, exitNo) {
      const rows = byStation.get(station) || [];
      if (!rows.length) {
        document.getElementById('title').textContent = '데이터가 없습니다';
        document.getElementById('facilityList').innerHTML = '';
        document.getElementById('linesBadges').innerHTML = '';
        document.getElementById('exitLabel').textContent = '출구';
        return;
      }

      const lines = getStationLines(rows);
      document.getElementById('title').textContent = station;
      document.getElementById('subtitle').textContent = `공유 URL: exit_view_offline.html?station=${encodeURIComponent(station)}&exit=${encodeURIComponent(exitNo)}`;

      const badges = document.getElementById('linesBadges');
      badges.innerHTML = '';
      lines.forEach(l => {
        const span = document.createElement('span');
        span.className = 'chip';
        span.innerHTML = `<i class="fa-solid fa-train-subway"></i>${l}`;
        badges.appendChild(span);
      });

      document.getElementById('exitLabel').textContent = `${exitNo}번 출구 주변시설`;

      const row = rows.find(r => String(r.exit_no) === String(exitNo)) || rows[0];
      const facilities = row.facilities || splitFacilities(row.facilities_raw || '').map(x=>x);

      const list = document.getElementById('facilityList');
      list.innerHTML = '';
      if (!facilities.length) {
        list.innerHTML = `<div class="text-slate-400 text-sm">등록된 주변시설이 없습니다.</div>`;
        return;
      }

      facilities.forEach(name => {
        const t = tagFacility(name);
        const item = document.createElement('div');
        item.className = 'bg-slate-900/60 border border-slate-700 rounded-lg p-3 flex flex-col sm:flex-row sm:items-center justify-between gap-2';
        item.innerHTML = `
          <div class="flex items-start gap-3">
            <div class="w-9 h-9 rounded-lg bg-slate-800 flex items-center justify-center border border-slate-700">
              <i class="fa-solid ${t.icon} text-slate-200"></i>
            </div>
            <div>
              <div class="font-bold text-white leading-snug">${name}</div>
              <div class="mt-1 flex flex-wrap gap-2">
                <span class="chip"><i class="fa-solid fa-tag"></i>${t.key}</span>
                <span class="chip"><i class="fa-solid fa-door-open"></i>${row.exit_no}번</span>
              </div>
            </div>
          </div>
          <div class="flex gap-2">
            <a class="text-sm px-3 py-2 rounded-lg bg-sky-700/40 hover:bg-sky-700/60 border border-sky-700/40 text-sky-100"
               href="${buildUrl(station, row.exit_no)}" title="이 출구로 고정된 링크">
               <i class="fa-solid fa-link mr-1"></i>고유 URL
            </a>
          </div>
        `;
        list.appendChild(item);
      });
    }

    function syncUrl(station, exitNo) {
      const u = new URL(location.href);
      u.searchParams.set('station', station);
      u.searchParams.set('exit', String(exitNo));
      history.replaceState(null, '', u.toString());
    }

    // events
    stationSelect.addEventListener('change', () => {
      const station = stationSelect.value;
      fillExits(station, '');
      const exitNo = exitSelect.value;
      syncUrl(station, exitNo);
      renderDetail(station, exitNo);
    });

    exitSelect.addEventListener('change', () => {
      const station = stationSelect.value;
      const exitNo = exitSelect.value;
      syncUrl(station, exitNo);
      renderDetail(station, exitNo);
    });

    document.getElementById('copyStationLink').addEventListener('click', () => {
      const station = stationSelect.value;
      copyText(buildUrl(station, ''));
    });
    document.getElementById('copyExitLink').addEventListener('click', () => {
      const station = stationSelect.value;
      const exitNo = exitSelect.value;
      copyText(buildUrl(station, exitNo));
    });

    // init
    (function init() {
      const params = getParams();
      const defaultStation = params.station && byStation.has(params.station) ? params.station : (stations[0] || '');
      fillStations(defaultStation);
      fillExits(defaultStation, params.exit || '');
      // if exit param invalid, default to first exit
      if (!exitSelect.value) {
        exitSelect.selectedIndex = 0;
      }
      const exitNo = exitSelect.value;
      renderDetail(defaultStation, exitNo);
      // normalize url
      syncUrl(defaultStation, exitNo);
    })();
  </script>
</body>
</html>
