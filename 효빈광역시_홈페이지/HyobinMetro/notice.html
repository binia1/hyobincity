  function getParams() {
    const url = new URL(window.location.href);
    return {
      q: url.searchParams.get('q') || '',
      cat: url.searchParams.get('cat') || 'all',
      page: parseInt(url.searchParams.get('page') || '1', 10) || 1,
    };
  }

  function setParams({ q, cat, page }, push = true) {
    const url = new URL(window.location.href);
    if (q) url.searchParams.set('q', q); else url.searchParams.delete('q');
    if (cat && cat !== 'all') url.searchParams.set('cat', cat); else url.searchParams.delete('cat');
    if (page && page !== 1) url.searchParams.set('page', String(page)); else url.searchParams.delete('page');
    if (push) history.pushState(null, '', url.toString());
    else history.replaceState(null, '', url.toString());
  }

  function dateToNum(s) {
    const m = String(s||'').match(/(\d{4})\.(\d{2})\.(\d{2})/);
    if (!m) return 0;
    return parseInt(m[1] + m[2] + m[3], 10);
  }

  const CATEGORY_LABEL = {
    all: '전체',
    must: '필독',
    notice: '공지',
    recruit: '채용',
    bid: '입찰',
    culture: '문화',
    event: '행사',
    safety: '안전'
  };

  function ensureCategoryOptions() {
    const select = document.getElementById('categorySelect');
    if (!select) return;

    const present = new Set(NOTICE_INDEX.map(n => n.catKey));
    const ordered = ['all','must','notice','recruit','bid','culture','event','safety'];
    const finalKeys = ordered.filter(k => k === 'all' || present.has(k));

    select.innerHTML = finalKeys.map(k => `<option value="${k}">${CATEGORY_LABEL[k] || k}</option>`).join('');
  }

  function applyFilters(list, { q, cat }) {
    const keyword = (q || '').trim().toLowerCase();
    return list.filter(n => {
      if (cat && cat !== 'all' && n.catKey !== cat) return false;
      if (!keyword) return true;
      const hay = `${n.title} ${n.dept} ${n.category}`.toLowerCase();
      return hay.includes(keyword);
    });
  }

  function escapeHtml(str) {
    return String(str ?? '').replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m]));
  }

  function buildRow(n, displayNo) {
    const isPinned = !!n.pinned;
    const rowClass = isPinned ? 'bg-sky-50' : '';
    const noCell = isPinned
      ? '<i class="fa-solid fa-thumbtack text-sky-600"></i>'
      : String(displayNo);

    const badge = (() => {
      const cat = n.category;
      if (cat === '필독') return '<span class="bg-red-100 text-red-600 text-xs font-bold px-2 py-1 rounded">필독</span>';
      if (cat === '공지') return '<span class="bg-blue-100 text-blue-600 text-xs font-bold px-2 py-1 rounded">공지</span>';
      if (cat === '채용') return '<span class="bg-green-100 text-green-600 text-xs font-bold px-2 py-1 rounded">채용</span>';
      if (cat === '입찰') return '<span class="bg-amber-100 text-amber-700 text-xs font-bold px-2 py-1 rounded">입찰</span>';
      if (cat === '문화') return '<span class="bg-pink-100 text-pink-600 text-xs font-bold px-2 py-1 rounded">문화</span>';
      if (cat === '행사') return '<span class="bg-purple-100 text-purple-600 text-xs font-bold px-2 py-1 rounded">행사</span>';
      if (cat === '안전') return '<span class="bg-slate-200 text-slate-700 text-xs font-bold px-2 py-1 rounded">안전</span>';
      return `<span class="bg-slate-100 text-slate-600 text-xs font-bold px-2 py-1 rounded">${escapeHtml(cat)}</span>`;
    })();

    const href = n.href || '#';
    const views = n.views || '-';

    return `
      <tr class="${rowClass}" data-href="${href}" role="link" tabindex="0">
        <td class="hide-mobile">${noCell}</td>
        <td>${badge}</td>
        <td class="title-col font-bold text-slate-800">${escapeHtml(n.title)}</td>
        <td class="hide-mobile">${escapeHtml(n.dept || '-')}</td>
        <td>${escapeHtml(n.date || '-')}</td>
        <td class="hide-mobile">${escapeHtml(views)}</td>
      </tr>
    `;
  }

  const PER_PAGE = 8;
  const MAX_PAGE_BUTTONS = 5;

  function render() {
    const params = getParams();
    const select = document.getElementById('categorySelect');
    const input = document.getElementById('searchInput');

    if (select) select.value = params.cat;
    if (input) input.value = params.q;

    const sorted = [...NOTICE_INDEX].sort((a,b) => {
      if (!!a.pinned !== !!b.pinned) return a.pinned ? -1 : 1;
      return dateToNum(b.date) - dateToNum(a.date);
    });

    const filtered = applyFilters(sorted, params);

    const totalEl = document.getElementById('totalCount');
    if (totalEl) totalEl.textContent = String(filtered.length);

    const totalPages = Math.max(1, Math.ceil(filtered.length / PER_PAGE));
    let page = Math.min(Math.max(1, params.page), totalPages);

    if (page !== params.page) setParams({ q: params.q, cat: params.cat, page }, false);

    const start = (page - 1) * PER_PAGE;
    const pageItems = filtered.slice(start, start + PER_PAGE);

    const tbody = document.getElementById('noticeTbody');
    if (tbody) {
      const baseNo = filtered.length - start;
      tbody.innerHTML = pageItems.map((n, idx) => buildRow(n, baseNo - idx)).join('');
    }

    renderPagination(page, totalPages);
  }

  function renderPagination(current, totalPages) {
    const root = document.getElementById('pagination');
    if (!root) return;

    let start = 1;
    let end = Math.min(totalPages, MAX_PAGE_BUTTONS);
    if (totalPages > MAX_PAGE_BUTTONS) {
      const half = Math.floor(MAX_PAGE_BUTTONS / 2);
      start = Math.max(1, current - half);
      end = start + MAX_PAGE_BUTTONS - 1;
      if (end > totalPages) {
        end = totalPages;
        start = end - MAX_PAGE_BUTTONS + 1;
      }
    }

    const btn = (label, p, disabled=false, active=false, title='') => {
      const base = active
        ? 'w-8 h-8 rounded bg-sky-600 text-white font-bold flex items-center justify-center'
        : 'w-8 h-8 rounded border border-slate-200 text-slate-700 font-bold hover:bg-slate-50 flex items-center justify-center';
      const dis = disabled ? ' opacity-40 pointer-events-none' : '';
      return `<button class="${base}${dis}" ${title?`title="${title}"`:''} onclick="goPage(${p})">${label}</button>`;
    };

    const parts = [];
    parts.push(btn('<i class="fa-solid fa-angles-left"></i>', 1, current===1, false, '처음'));
    parts.push(btn('<i class="fa-solid fa-angle-left"></i>', Math.max(1, current-1), current===1, false, '이전'));

    for (let p = start; p <= end; p++) {
      parts.push(btn(String(p), p, false, p===current));
    }

    if (end < totalPages) parts.push(`<span class="text-slate-400 font-black px-1">…</span>`);

    parts.push(btn('<i class="fa-solid fa-angle-right"></i>', Math.min(totalPages, current+1), current===totalPages, false, '다음'));
    parts.push(btn('<i class="fa-solid fa-angles-right"></i>', totalPages, current===totalPages, false, '마지막'));

    root.innerHTML = parts.join('');
  }

  window.goPage = function(p) {
    const params = getParams();
    setParams({ q: params.q, cat: params.cat, page: p });
    render();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  };

  function bindEvents() {
    const select = document.getElementById('categorySelect');
    const input = document.getElementById('searchInput');
    const button = document.getElementById('searchButton');

    if (select) {
      select.addEventListener('change', () => {
        const params = getParams();
        setParams({ q: params.q, cat: select.value, page: 1 });
        render();
      });
    }

    const doSearch = () => {
      const params = getParams();
      const q = (input?.value || '').trim();
      setParams({ q, cat: params.cat, page: 1 });
      render();
    };

    if (button) button.addEventListener('click', doSearch);
    if (input) {
      input.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') doSearch();
      });
    }

    document.addEventListener('click', (e) => {
      const row = e.target.closest('tr[data-href]');
      if (!row) return;
      if (e.target.closest('a,button,input,select')) return;
      const href = row.getAttribute('data-href');
      if (href) window.location.href = href;
    });

    document.addEventListener('keydown', (e) => {
      if (e.key !== 'Enter') return;
      const row = document.activeElement?.closest?.('tr[data-href]');
      if (!row) return;
      const href = row.getAttribute('data-href');
      if (href) window.location.href = href;
    });

    window.addEventListener('popstate', render);
  }

  window.addEventListener('load', () => {
    ensureCategoryOptions();
    bindEvents();
    render();
  });
</script>
