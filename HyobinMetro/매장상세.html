// ==========================================
// 2. 서비스 아이콘 매핑 함수
// ==========================================
function getServiceIcon(type) {
    const icons = {
        "wifi": { icon: "fa-wifi", text: "무료 와이파이" },
        "pay": { icon: "fa-won-sign", text: "지역화폐 결제" },
        "easy_pay": { icon: "fa-credit-card", text: "간편 결제" },
        "pack": { icon: "fa-bag-shopping", text: "포장 가능" },
        "cafe": { icon: "fa-mug-hot", text: "콜라보 카페" },
        "lounge": { icon: "fa-couch", text: "VIP/휴게 라운지" },
        "gacha": { icon: "fa-shapes", text: "대형 캡슐 가챠" },
        "photo": { icon: "fa-camera", text: "인증샷 포토 부스" },
        "custom": { icon: "fa-print", text: "커스텀 굿즈 제작" },
        "taxfree": { icon: "fa-plane-departure", text: "외국인 Tax-Free" },
        "delivery": { icon: "fa-truck-fast", text: "해외/캐리어 택배 배송" }
    };
    return icons[type] || { icon: "fa-circle-check", text: type };
}

// ==========================================
// 3. 페이지 렌더링 함수
// ==========================================
function renderStore(storeId) {
    const store = storeDB[storeId] || storeDB["hq"]; // 매장이 없으면 본점으로 리다이렉트
    
    // CSS 변수 업데이트 (매장별 고유 테마 컬러 변경)
    document.documentElement.style.setProperty('--theme-gradient', store.themeGradient);
    document.documentElement.style.setProperty('--theme-color', store.themeColor);
    
    // 타이틀 및 기본 정보 렌더링
    document.title = `${store.name} | HB GOODS 매장 안내`;
    document.getElementById('storeTitle').innerHTML = store.name;
    document.getElementById('storeDesc').innerHTML = store.desc;
    
    // 상단 뱃지 렌더링 (지역, 호선)
    document.getElementById('storeBadges').innerHTML = `
      <span class="inline-block badge-bg border border-white/20 px-3 py-1 rounded-full text-xs font-extrabold shadow-sm">
        ${store.region}
      </span>
      <span class="inline-flex items-center gap-1.5 badge-bg border border-white/20 px-3 py-1 rounded-full text-xs font-black shadow-sm">
        <i class="fa-solid ${store.lineIcon}"></i> ${store.line}
      </span>
    `;
    
    // 운영 정보 렌더링 (시간, 연락처, 주소)
    document.getElementById('storeInfo').innerHTML = `
      <span class="badge-bg border border-white/10 px-3 py-2 rounded-xl backdrop-blur-sm shadow-sm">
        <i class="fa-regular fa-clock mr-1"></i> ${store.hours}
      </span>
      <span class="badge-bg border border-white/10 px-3 py-2 rounded-xl backdrop-blur-sm shadow-sm">
        <i class="fa-solid fa-phone mr-1"></i> ${store.phone}
      </span>
      <span class="badge-bg border border-white/10 px-3 py-2 rounded-xl backdrop-blur-sm shadow-sm">
        <i class="fa-solid fa-location-dot mr-1"></i> ${store.address}
      </span>
    `;
    
    // 태그 렌더링 (점장 오시 강조 등)
    let tagsHtml = '';
    store.tags.forEach(tag => {
        const isOshi = tag.includes('점장') || tag.includes('오시');
        const colorClass = isOshi ? 'text-yellow-300 border-yellow-300/50' : 'border-white/20';
        tagsHtml += `<span class="bg-white/10 px-3 py-2 rounded-xl text-xs font-extrabold shadow-sm border ${colorClass}">${tag}</span>`;
    });
    document.getElementById('storeTags').innerHTML = tagsHtml;
    
    // 이미지 처리 (실제 이미지 경로 시도 후 실패 시 색상 맞춤 플레이스홀더 제공)
    const imgElem = document.getElementById('storeImage');
    imgElem.src = `이미지/${store.name}.png`;
    imgElem.onerror = function() {
        const fallbackColor = store.themeColor.replace('#', '');
        this.src = `https://placehold.co/1200x600/1e293b/${fallbackColor}?text=${encodeURIComponent(store.name)}`;
    };
    
    document.getElementById('imgTag').innerText = store.imgTag;
    document.getElementById('imgSub').innerHTML = store.imgSub;
    
    // 세부 내용 렌더링
    document.getElementById('storePoint').innerHTML = store.point;
    document.getElementById('storeRecommend').innerHTML = store.recommend;
    document.getElementById('storeNotice').innerHTML = store.notice;
    
    // 제공 서비스 유의사항 (데이터에 정의되어 있으면 그걸 쓰고 없으면 기본 로어 문구)
    if(store.serviceNotice) {
        document.getElementById('serviceNotice').innerHTML = store.serviceNotice;
    } else {
        document.getElementById('serviceNotice').innerHTML = "※ 가챠 및 한정판 랜덤 상품은 개봉 후 교환/환불이 절대 불가합니다. 팝업 행사(HAF 등) 기간에는 전동차 및 역사 내 에스컬레이터 뜀박질이 적발될 경우 고나미 기관사의 무관용 원칙에 따라 즉각 퇴장 조치됩니다.";
    }
    
    // 서비스 아이콘 그리드 렌더링
    let serviceHtml = '';
    store.services.forEach(svc => {
        const s = getServiceIcon(svc);
        serviceHtml += `
          <div class="bg-slate-50 border border-slate-200 rounded-xl p-4 flex flex-col items-center justify-center gap-2 text-center shadow-sm transition hover:border-theme hover:bg-theme-light group">
            <i class="fa-solid ${s.icon} text-2xl text-slate-400 group-hover:text-theme transition-colors"></i>
            <div class="text-xs font-extrabold text-slate-700 mt-1">${s.text}</div>
          </div>
        `;
    });
    document.getElementById('serviceGrid').innerHTML = serviceHtml;
}

// ==========================================
// 4. 초기화 및 이벤트 바인딩
// ==========================================
window.onload = function() {
    // 1. 드롭다운 옵션 채우기 (DB에 있는 22개 매장 목록 자동 생성)
    const selector = document.getElementById('storeSelector');
    for (const [key, value] of Object.entries(storeDB)) {
        const option = document.createElement('option');
        option.value = key;
        option.text = value.name;
        selector.appendChild(option);
    }
    
    // 2. URL 파라미터 확인 후 초기 렌더링 (없으면 본점 기본)
    const params = new URLSearchParams(window.location.search);
    const storeId = params.get('id') || 'hq'; 
    
    if(storeDB[storeId]) {
        selector.value = storeId;
    }
    
    renderStore(storeId);
    
    // 3. 드롭다운 변경 시 즉각적으로 해당 매장으로 렌더링
    selector.addEventListener('change', function(e) {
        const selectedId = e.target.value;
        // URL을 변경하여 뒤로가기 가능하게 만듦
        window.history.pushState({}, '', `?id=${selectedId}`);
        renderStore(selectedId);
        window.scrollTo({ top: 0, behavior: 'smooth' });
    });
};
</script>
