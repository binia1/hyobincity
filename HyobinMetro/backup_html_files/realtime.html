<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>실시간 열차운행정보 - 효빈교통공사</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;600;800&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>
  
  <!-- 스타일 정의: 노선 색상 및 UI -->
  <style>
    body { font-family: 'Pretendard', sans-serif; background-color: #f1f5f9; }
    
    /* 노선별 색상 변수 */
    :root {
      --L1: #0077DD; --L2: #00CCAA; --L3: #FFCC11;
      --L4: #FF5522; --L5: #EE0022; --L6: #881188;
      --L7: #FF8899; --L8: #9856FF; --BH: #6677CC;
    }

    /* 노선 배지 스타일 */
    .badge-line { padding: 3px 8px; border-radius: 4px; color: white; font-weight: 800; font-size: 0.75rem; white-space: nowrap; display: inline-flex; align-items: center; gap: 4px; }
    .bg-l1 { background-color: var(--L1); }
    .bg-l2 { background-color: var(--L2); }
    .bg-l3 { background-color: var(--L3); color: #222; }
    .bg-l4 { background-color: var(--L4); }
    .bg-l5 { background-color: var(--L5); }
    .bg-l6 { background-color: var(--L6); }
    .bg-l7 { background-color: var(--L7); }
    .bg-l8 { background-color: var(--L8); }
    .bg-bh { background-color: var(--BH); }

    /* 열차 아이콘 애니메이션 */
    .train-icon { transition: transform 0.5s ease-in-out; }
    .train-row:hover .train-icon { transform: translateX(5px); }

    /* 열차 종별 배지 */
    .badge-exp { background-color: #d81c2f; color: white; font-size: 0.65rem; padding: 2px 5px; border-radius: 3px; margin-left: 4px; font-weight: bold; }
    .badge-loc { background-color: #64748b; color: white; font-size: 0.65rem; padding: 2px 5px; border-radius: 3px; margin-left: 4px; }
    .badge-shuttle { background-color: #0ea5e9; color: white; font-size: 0.65rem; padding: 2px 5px; border-radius: 3px; margin-left: 4px; font-weight: bold; }

    /* 버스 배지 */
    .bus-badge { display: inline-block; padding: 4px 8px; margin: 2px; color: white; border-radius: 12px; font-size: 11px; font-weight: bold; }
  </style>

  <!-- 역 데이터 로드 (파일이 없으면 더미 데이터 사용) -->
  <script src="hyobin_station_data_v2.js" onerror="window.NO_STATION_DATA=true;"></script>
</head>
<body class="text-slate-800">

  <!-- 헤더 -->
  <header class="bg-white border-b border-slate-200 sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-4 h-16 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <a href="index.html" class="flex items-center gap-2 group">
          <div class="w-8 h-8 bg-sky-500 rounded-lg flex items-center justify-center text-white font-black text-lg group-hover:bg-sky-600 transition">H</div>
          <div class="leading-tight">
            <div class="font-extrabold text-slate-900">효빈교통공사</div>
            <div class="text-[10px] text-slate-500 font-bold tracking-wider">HYOBIN METRO</div>
          </div>
        </a>
        <div class="hidden md:flex h-6 w-px bg-slate-200 mx-2"></div>
        <div class="hidden md:block text-xs font-semibold text-slate-500">
          <span id="clock" class="font-mono text-sky-600 font-bold text-sm">00:00:00</span> 기준 운행현황
        </div>
      </div>
      
      <!-- 네비게이션 버튼 추가 -->
      <div class="flex gap-2">
        <a href="index.html" class="flex items-center gap-1 bg-slate-100 hover:bg-slate-200 text-slate-700 px-3 py-2 rounded-lg text-xs font-bold transition">
          <i data-lucide="home" class="w-3 h-3"></i> 메인으로
        </a>
        <a href="arrival_board.html" class="flex items-center gap-1 bg-sky-100 hover:bg-sky-200 text-sky-700 px-3 py-2 rounded-lg text-xs font-bold transition">
          <i data-lucide="monitor" class="w-3 h-3"></i> 역별 도착정보
        </a>
        <button onclick="location.reload()" class="flex items-center gap-1 bg-slate-100 hover:bg-slate-200 text-slate-700 px-3 py-2 rounded-lg text-xs font-bold transition">
          <i data-lucide="refresh-cw" class="w-3 h-3"></i>
        </button>
      </div>
    </div>
  </header>

  <main class="max-w-7xl mx-auto px-4 py-6 grid grid-cols-1 lg:grid-cols-12 gap-6">
    
    <!-- 좌측: 노선 선택 패널 -->

          <i data-lucide="map" class="w-4 h-4"></i> 노선 선택
        </h2>
        <div id="lineList" class="space-y-2 max-h-[70vh] overflow-y-auto pr-1">
          <!-- JS로 노선 버튼 생성 -->
        </div>
      </div>

      <!-- 버스 범례 -->
      <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-4">
        <h2 class="text-xs font-extrabold text-slate-500 mb-2 uppercase">연계 버스 정보</h2>
        <div class="flex flex-wrap gap-1">
          <span class="bus-badge" style="background: #01B7ED;">간선</span>
          <span class="bus-badge" style="background: #E7D600;">순환</span>
          <span class="bus-badge" style="background: #37B484;">지선</span>
          <span class="bus-badge" style="background: #485EC6;">광역</span>
          <span class="bus-badge" style="background: #FF5800;">좌석</span>
          <span class="bus-badge" style="background: #D81C2F;">급행</span>
          <span class="bus-badge" style="background: #A664A0;">마을</span>
          <span class="bus-badge" style="background: #84C36E;">공항</span>
          <span class="bus-badge" style="background: #7777AA;">투어</span>
        </div>
      </div>
    </section>

    <!-- 우측: 상세 운행 정보 -->
    <section class="lg:col-span-8">
      <div class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden min-h-[600px]">
        <!-- 상단 정보창 -->
        <div class="p-6 border-b border-slate-100 bg-slate-50">
          <div class="flex justify-between items-start">
            <div>
              <div id="currentLineBadge" class="inline-block mb-2">
                <span class="badge-line bg-l1 text-sm">1호선</span>
              </div>
              <h1 id="currentLineTitle" class="text-2xl font-black text-slate-900">효빈 1호선 (본선/탄성지선)</h1>
              <p id="currentLineDesc" class="text-sm text-slate-600 mt-1 font-medium">
                대형 중전철(9량) • 배차 2분 • 전 구간 대피선 보유
              </p>
            </div>
            <div class="text-right">
              <div class="text-xs text-slate-500 font-bold mb-1">실시간 운행</div>
              <div class="text-3xl font-black text-slate-800"><span id="activeTrainCount">0</span><span class="text-sm text-slate-400 font-normal ml-1">대</span></div>
              <div class="text-[10px] text-slate-400 mt-1">총 보유: <span id="totalFleetCount">-</span>편성 (예비차 제외 전량 투입)</div>
            </div>
          </div>
          
          <!-- 운행 팁 박스 -->
          <div id="tipBox" class="mt-4 bg-white border border-slate-200 rounded-lg p-3 text-xs text-slate-600 flex gap-2 items-start">
            <i data-lucide="info" class="w-4 h-4 text-sky-500 shrink-0 mt-0.5"></i>
            <span id="tipText">안천역, 북구청역 타절 열차가 많습니다. 외곽 이동 시 행선지를 확인하세요.</span>
          </div>
        </div>

        <!-- 열차 리스트 테이블 -->
        <div class="overflow-x-auto max-h-[600px]">
          <table class="w-full text-sm text-left relative">
            <thead class="bg-white text-slate-500 border-b border-slate-200 font-bold text-xs uppercase sticky top-0 z-10 shadow-sm">
              <tr>
                <th class="px-6 py-3 w-20 bg-slate-50">열차번호</th>
                <th class="px-6 py-3 bg-slate-50">종별/편성</th>
                <th class="px-6 py-3 bg-slate-50">행선지</th>
                <th class="px-6 py-3 bg-slate-50">현재위치</th>
                <th class="px-6 py-3 bg-slate-50">상태</th>
              </tr>
            </thead>
            <tbody id="trainListBody" class="divide-y divide-slate-50">
              <!-- JS로 데이터 로드 -->
            </tbody>
          </table>
        </div>
        
        <!-- 데이터 없음 표시 -->
        <div id="emptyState" class="hidden flex-col items-center justify-center py-20 text-slate-400">
          <i data-lucide="train" class="w-12 h-12 mb-2 opacity-20"></i>
          <span class="text-sm font-bold">현재 운행 중인 열차가 없습니다.</span>
        </div>
      </div>
    </section>
  </main>

    // 현재 선택된 노선 ID
    let currentLineId = "1";

    function updateClock() {
      const now = new Date();
      const timeStr = now.toLocaleTimeString('ko-KR', { hour12: false });
      document.getElementById('clock').innerText = timeStr;
      
      const hour = now.getHours();
      // 러시아워: 07~09, 17~20
      const isRH = (hour >= 7 && hour <= 9) || (hour >= 17 && hour <= 20);
      return isRH;
    }

    function renderLineList() {
      const listEl = document.getElementById('lineList');
      listEl.innerHTML = '';

      Object.keys(HYOBIN_REALTIME_CONFIG).forEach(id => {
        const line = HYOBIN_REALTIME_CONFIG[id];
        const btn = document.createElement('button');
        btn.className = `w-full text-left p-3 rounded-lg border border-slate-100 hover:border-slate-300 hover:shadow-sm transition flex items-center gap-3 ${id === currentLineId ? 'bg-slate-50 ring-2 ring-sky-100' : 'bg-white'}`;
        btn.onclick = () => selectLine(id);
        
        btn.innerHTML = `
          <span class="badge-line ${line.colorClass} w-16 justify-center text-[11px]">${line.name}</span>
          <div class="flex-1">
            <div class="text-xs font-bold text-slate-800">${line.desc}</div>
            <div class="text-[10px] text-slate-400 mt-0.5">${line.operator} • ${line.fleetSize}편성</div>
          </div>
          <i data-lucide="chevron-right" class="w-4 h-4 text-slate-300"></i>
        `;
        listEl.appendChild(btn);
      });
      lucide.createIcons();
    }

    function selectLine(id) {
      currentLineId = id;
      renderLineList();
      renderTrainInfo(id);
    }

    // [핵심 로직] 차량 보유량(fleetSize) 기반 운행 시뮬레이션
    function renderTrainInfo(id) {
      const config = HYOBIN_REALTIME_CONFIG[id];
      const isRH = updateClock();
      
      document.getElementById('currentLineBadge').innerHTML = `<span class="badge-line ${config.colorClass} text-lg px-3 py-1">${config.name}</span>`;
      document.getElementById('currentLineTitle').innerText = config.desc;
      document.getElementById('currentLineDesc').innerText = `${config.type} (${config.cars}량) • 총 ${config.fleetSize}편성 보유`;
      document.getElementById('tipText').innerText = config.tips;
      document.getElementById('totalFleetCount').innerText = config.fleetSize;

      // 실제 운행 대수 계산 (수정: 가동률 대폭 상향)
      // RH: 95% (거의 전량 투입)
      // NH: 80% (상당수 투입)
      const utilizationRate = isRH ? 0.95 : 0.80; 
      // 랜덤 변동성(±2%)
      const variance = (Math.random() * 0.04) - 0.02; 
      
      // 최소 운행 대수 보장 (노선 길이가 짧은 8호선 등 고려)
      const calculatedTrains = Math.floor(config.fleetSize * (utilizationRate + variance));
      const activeTrains = Math.max(3, calculatedTrains);
      
      document.getElementById('activeTrainCount').innerText = activeTrains;

      const tbody = document.getElementById('trainListBody');
      tbody.innerHTML = '';

      if (activeTrains <= 0) {
        document.getElementById('emptyState').classList.remove('hidden');
        document.getElementById('emptyState').classList.add('flex');
        return;
      } else {
        document.getElementById('emptyState').classList.add('hidden');
        document.getElementById('emptyState').classList.remove('flex');
      }

      for (let i = 0; i < activeTrains; i++) {
        const dest = getWeightedDestination(config.destinations);
        
        // 차량 번호 생성 (실제 데이터 범위 내에서 랜덤)
        let trainNum = "";
        if (id === 'bh') {
            trainNum = `K${791000 + Math.floor(Math.random()*42)}`;
        } else {
            // 예: 1호선은 1001~1111 등 다양하지만 단순화를 위해 1000번대 랜덤
            const baseNum = parseInt(id) * 1000;
            const unitNum = Math.floor(Math.random() * config.fleetSize) + 1;
            // padStart로 4자리 맞춤 (예: 1001)
            trainNum = `S${baseNum + unitNum}`;
        }
        
        const statusList = ["운행중", "진입", "도착", "출발대기"];
        const status = statusList[Math.floor(Math.random() * statusList.length)];
        
        // 현재 위치 선택
        let currentLoc = "정보수신중";
        if (config.stations && config.stations.length > 0) {
             const rs = config.stations[Math.floor(Math.random() * config.stations.length)];
             currentLoc = rs + (Math.random() > 0.6 ? " (진입)" : "");
        }

        // 급행/셔틀 배지
        let trainTypeBadge = `<span class="badge-loc">완행</span>`;
        if (dest.type.indexOf("급행") > -1) {
           trainTypeBadge = `<span class="badge-exp">${dest.type === "급행가능" ? "급행" : dest.type}</span>`;
        } else if (dest.type.indexOf("셔틀") > -1) {
           trainTypeBadge = `<span class="badge-shuttle">셔틀</span>`;
        } else if (dest.type === "급행가능" && Math.random() < 0.3) {
           trainTypeBadge = `<span class="badge-exp">급행</span>`;
        }

        // 차량 량수 표기 (7호선은 행선지에 따라 다름)
        let carsText = `${config.cars}량`;
        if(id === "7") {
            // 중보지선(조유 경유)은 2량
            if(dest.name.includes("조유") || dest.type.includes("지선")) carsText = "2량";
            else carsText = "3량";
        }

        const tr = document.createElement('tr');
        tr.className = "train-row bg-white border-b border-slate-50 hover:bg-slate-50 transition";
        tr.innerHTML = `
          <td class="px-6 py-4 font-mono font-bold text-slate-400">#${trainNum}</td>
          <td class="px-6 py-4">
            <div class="flex items-center gap-2">
              <i data-lucide="train-front" class="w-4 h-4 ${config.colorClass.replace('bg-', 'text-')} train-icon"></i>
              <span class="font-bold text-slate-700">${config.type}</span>
              <span class="text-xs text-slate-400">(${carsText})</span>
            </div>
          </td>
          <td class="px-6 py-4">
            <div class="flex items-center">
              <span class="font-bold text-lg text-slate-800">${dest.name}</span>
              ${trainTypeBadge}
            </div>
          </td>
          <td class="px-6 py-4 text-slate-600 font-medium">
            ${currentLoc}
          </td>
          <td class="px-6 py-4">
            <span class="inline-block px-2 py-1 rounded text-xs font-bold ${status === '운행중' ? 'bg-emerald-100 text-emerald-600' : 'bg-slate-100 text-slate-500'}">
              ${status}
            </span>
          </td>
        `;
        tbody.appendChild(tr);
      }
      lucide.createIcons();
    }

    function getWeightedDestination(destinations) {
      let totalWeight = 0;
      destinations.forEach(d => totalWeight += d.weight);
      let random = Math.random() * totalWeight;
      for (let i = 0; i < destinations.length; i++) {
        random -= destinations[i].weight;
        if (random <= 0) return destinations[i];
      }
      return destinations[0];
    }

    window.onload = function() {
      renderLineList();
      selectLine("1"); // 기본 1호선 선택
      setInterval(() => {
        updateClock();
        renderTrainInfo(currentLineId);
      }, 10000); 
      updateClock();
    };
  </script>
