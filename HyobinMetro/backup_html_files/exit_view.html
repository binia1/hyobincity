<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>역 출구 주변 시설 상세 - 효빈교통공사</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
  <style>body{font-family:'Noto Sans KR',sans-serif}</style>
</head>
<body class="bg-slate-50 min-h-screen">
  <header class="bg-white border-b border-slate-200 sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
      <a href="exit_facilities.html" class="font-black text-slate-900 flex items-center gap-2">
        <i class="fa-solid fa-arrow-left text-sky-600"></i>출구 주변 시설
      </a>
      <a href="index.html" class="font-black text-slate-700 hover:text-sky-600">HOME</a>
    </div>
  </header>

  <main class="max-w-5xl mx-auto px-4 sm:px-6 lg:px-8 py-10">
    <div class="bg-white rounded-2xl border border-slate-200 shadow-sm overflow-hidden">
      <div class="p-6 border-b border-slate-200 bg-slate-50">
        <h1 id="title" class="text-2xl font-black text-slate-900">불러오는 중…</h1>
        <p id="sub" class="mt-1 text-sm font-bold text-slate-600"></p>
      </div>
      <div class="p-6">
        <div class="flex flex-wrap gap-2 mb-5">
          <a href="public_data/hyobin_station_exit_facilities.csv" download class="px-4 py-2 rounded-lg bg-slate-900 text-white font-black hover:bg-black transition text-sm">
            <i class="fa-solid fa-file-csv mr-2"></i>CSV
          </a>
          <a href="public_data/hyobin_station_exit_facilities_v2.json" download class="px-4 py-2 rounded-lg bg-slate-100 text-slate-800 font-black hover:bg-slate-200 transition text-sm">
            <i class="fa-solid fa-code mr-2"></i>JSON
          </a>
        </div>

        <div class="overflow-x-auto">
          <table class="min-w-full text-sm text-left">
            <thead class="bg-white border-b border-slate-200">
              <tr class="text-slate-600">
                <th class="px-4 py-3 font-black">출구</th>
                <th class="px-4 py-3 font-black">노선</th>
                <th class="px-4 py-3 font-black">주변시설</th>
              </tr>
            </thead>
            <tbody id="tbody" class="bg-white"></tbody>
          </table>
        </div>

        <p id="hint" class="mt-5 text-xs font-bold text-slate-500"></p>
      </div>
    </div>
  </main>

<script>
  const qs = new URLSearchParams(location.search);
  const station = qs.get('station') || '';

  const titleEl = document.getElementById('title');
  const subEl = document.getElementById('sub');
  const bodyEl = document.getElementById('tbody');
  const hintEl = document.getElementById('hint');

  const flattenLines = (linesArr) => (linesArr||[]).join(',');

  async function load(){
    try{
      const res = await fetch('public_data/hyobin_station_exit_facilities_v2.json', {cache:'no-store'});
      const rows = await res.json();

      if(!station){
        titleEl.textContent = '역을 선택해주세요';
        subEl.textContent = '목록으로 돌아가 역을 클릭하세요.';
        hintEl.textContent = '';
        return;
      }

      const list = rows.filter(r => r.station === station).sort((a,b)=>a.exit_no-b.exit_no);
      titleEl.textContent = station + '역 출구 주변 시설';
      subEl.textContent = '총 ' + list.length.toLocaleString() + '건';

      bodyEl.innerHTML = '';
      list.forEach(r=>{
        const tr=document.createElement('tr');
        tr.className='border-b border-slate-100 hover:bg-slate-50';
        tr.innerHTML = `
          <td class="px-4 py-3 font-black text-slate-900 whitespace-nowrap">${r.exit_no}번</td>
          <td class="px-4 py-3 font-bold text-slate-700 whitespace-nowrap">${flattenLines(r.lines)}</td>
          <td class="px-4 py-3 font-bold text-slate-800">${r.facility}</td>
        `;
        bodyEl.appendChild(tr);
      });

      hintEl.textContent = '※ 데이터가 더 추가되면 자동 반영됩니다.';
    }catch(e){
      titleEl.textContent = '데이터를 불러오지 못했습니다';
      subEl.textContent = '로컬 file:// 실행 시 fetch 제한이 있을 수 있어요.';
      console.error(e);
    }
  }
  document.addEventListener('DOMContentLoaded', load);
</script>
</body>
</html>
