<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>장바구니 - 효빈교통공사 굿즈샵</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans KR', sans-serif; }
        del { color: #9ca3af; text-decoration-color: #ef4444; text-decoration-thickness: 2px; }
        .input { width:100%; padding:.75rem 1rem; border:1px solid #e5e7eb; border-radius:.75rem; outline:none; }
        .input:focus { border-color:#38bdf8; box-shadow:0 0 0 4px rgba(56,189,248,.18); }
    </style>
</head>
<body class="bg-gray-50 min-h-screen flex flex-col">

    <header class="bg-white border-b border-gray-200 sticky top-0 z-50 shadow-sm">
        <div class="max-w-7xl mx-auto px-4 h-16 flex justify-between items-center">
            <a href="new_arrival.html" class="flex items-center gap-2">
                <div class="h-8 w-8 bg-sky-600 rounded-full flex items-center justify-center text-white font-black text-xs">HB</div>
                <div class="text-3xl font-black text-sky-600 hidden md:block">HB</div>
                <div class="text-sm font-bold text-gray-800 leading-tight ml-2">효빈교통공사<br><span class="text-sky-600">GOODS SHOP</span></div>
            </a>
            <nav class="hidden md:flex space-x-8 text-sm font-bold text-gray-600">
                <a href="new_arrival.html" class="hover:text-sky-600 transition">신상품</a>
                <a href="마이페이지.html" class="hover:text-sky-600 transition">마이페이지</a>
                <a href="장바구니.html" class="text-sky-600 transition">장바구니</a>
            </nav>
        </div>
    </header>

    <main class="max-w-4xl mx-auto px-4 py-10 flex-grow w-full">
        <h1 class="text-3xl font-black text-gray-900 mb-2">장바구니</h1>
        <p class="text-sm text-gray-500 mb-8">담아두신 상품을 확인하고 결제를 진행해 주세요.</p>

        <div class="bg-white rounded-2xl border border-gray-200 shadow-sm overflow-hidden">
            <div id="cart-container" class="p-6 space-y-4">
                </div>
            
            <div id="cart-empty" class="hidden p-16 text-center">
                <i class="fa-solid fa-basket-shopping text-5xl text-gray-200 mb-4"></i>
                <h3 class="text-xl font-bold text-gray-800 mb-2">장바구니가 비어 있습니다.</h3>
                <p class="text-gray-500 mb-6">마스코트들이 애타게 주인을 기다리고 있습니다.(...)</p>
                <a href="new_arrival.html" class="px-6 py-3 bg-sky-600 text-white font-bold rounded-xl hover:bg-sky-700 transition">상품 보러가기</a>
            </div>

            <div id="cart-summary" class="bg-gray-50 p-6 border-t border-gray-200">
                <div class="flex justify-between items-center mb-2">
                    <span class="text-gray-500">상품 합계</span>
                    <span id="sum-subtotal" class="font-bold">0원</span>
                </div>
                <div class="flex justify-between items-center mb-2">
                    <span class="text-gray-500">배송비 (5만원 이상 무료)</span>
                    <span id="sum-shipping" class="font-bold">0원</span>
                </div>
                <div class="flex justify-between items-center mb-6 pt-4 border-t border-gray-200">
                    <span class="text-lg font-black text-gray-900">총 결제금액</span>
                    <span id="sum-total" class="text-3xl font-black text-sky-600">0원</span>
                </div>
                <button id="checkout-btn" onclick="processDirectCheckout()" class="w-full bg-sky-600 hover:bg-sky-700 text-white font-black py-4 rounded-xl shadow-md transition-all text-lg">
                    결제하기
                </button>
            </div>
        </div>
    </main>

    <script>
        const CART_KEY = "hyo_goods_cart_v1";
        const ORDER_KEY = "hyo_goods_orders_v1";
        let cart = [];

        function won(n){ return (Math.max(0, Math.round(n))).toLocaleString("ko-KR") + "원"; }

        function loadCart(){
            cart = JSON.parse(localStorage.getItem(CART_KEY) || "[]");
            renderCart();
        }

        function renderCart(){
            const container = document.getElementById("cart-container");
            const empty = document.getElementById("cart-empty");
            const summary = document.getElementById("cart-summary");

            if(cart.length === 0){
                container.classList.add("hidden");
                summary.classList.add("hidden");
                empty.classList.remove("hidden");
                return;
            }

            container.classList.remove("hidden");
            summary.classList.remove("hidden");
            empty.classList.add("hidden");

            let html = "";
            let subtotal = 0;

            cart.forEach(item => {
                subtotal += item.price * item.qty;
                html += `
                    <div class="flex items-center gap-4 py-4 border-b border-gray-100 last:border-0">
                        <img src="${item.img}" class="w-24 h-24 object-cover rounded-xl border border-gray-200 bg-gray-50" onerror="this.src='https://placehold.co/100x100?text=No+Img'">
                        <div class="flex-grow">
                            <h3 class="font-bold text-gray-900 text-lg"><a href="${item.title}.html" class="hover:text-sky-600">${item.title}</a></h3>
                            <div class="mt-2 flex items-center justify-between">
                                <div class="flex items-center gap-3 bg-gray-100 rounded-lg px-2 py-1 w-fit">
                                    <button onclick="changeQty('${item.id}', -1)" class="w-6 h-6 flex items-center justify-center font-bold text-gray-600 hover:text-sky-600">-</button>
                                    <span class="w-6 text-center font-bold text-sm">${item.qty}</span>
                                    <button onclick="changeQty('${item.id}', 1)" class="w-6 h-6 flex items-center justify-center font-bold text-gray-600 hover:text-sky-600">+</button>
                                </div>
                                <span class="font-black text-gray-900">${won(item.price * item.qty)}</span>
                            </div>
                        </div>
                        <button onclick="removeItem('${item.id}')" class="p-2 text-gray-400 hover:text-red-500 transition"><i class="fa-solid fa-trash"></i></button>
                    </div>
                `;
            });

            container.innerHTML = html;
            
            let shipping = subtotal >= 50000 ? 0 : 3000;
            let total = subtotal + shipping;

            document.getElementById("sum-subtotal").textContent = won(subtotal);
            document.getElementById("sum-shipping").textContent = shipping === 0 ? "무료" : won(shipping);
            document.getElementById("sum-total").textContent = won(total);
        }

        function changeQty(id, delta){
            const item = cart.find(i => i.id === id);
            if(item){
                item.qty += delta;
                if(item.qty <= 0) cart = cart.filter(i => i.id !== id);
                localStorage.setItem(CART_KEY, JSON.stringify(cart));
                loadCart();
            }
        }

        function removeItem(id){
            cart = cart.filter(i => i.id !== id);
            localStorage.setItem(CART_KEY, JSON.stringify(cart));
            loadCart();
        }

        function processDirectCheckout(){
            const btn = document.getElementById("checkout-btn");
            btn.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin"></i> 결제 승인 중...';
            btn.classList.add("bg-gray-400");
            btn.disabled = true;

            setTimeout(() => {
                let subtotal = cart.reduce((sum, item) => sum + (item.price * item.qty), 0);
                let shipping = subtotal >= 50000 ? 0 : 3000;
                
                const now = new Date();
                const orderId = "HB-" + now.getFullYear().toString().slice(-2) + String(now.getMonth()+1).padStart(2,"0") + String(now.getDate()).padStart(2,"0") + "-" + Math.floor(Math.random() * 10000);
                
                const order = {
                    orderId: orderId,
                    status: "배송준비중",
                    createdAt: now.toISOString(),
                    lines: cart,
                    totals: { total: subtotal + shipping }
                };

                let orders = JSON.parse(localStorage.getItem(ORDER_KEY) || "[]");
                orders.unshift(order);
                localStorage.setItem(ORDER_KEY, JSON.stringify(orders));

                // 장바구니 비우기
                localStorage.removeItem(CART_KEY);
                
                alert("결제가 성공적으로 완료되었습니다! 마이페이지로 이동합니다.");
                window.location.href = "마이페이지.html";
            }, 1500);
        }

        document.addEventListener("DOMContentLoaded", loadCart);
    </script>
</body>
</html>
