<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>챗봇 상담 - 효빈교통공사</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans KR', sans-serif; }
        
        .chat-scroll::-webkit-scrollbar { width: 6px; }
        .chat-scroll::-webkit-scrollbar-track { background: #f1f5f9; }
        .chat-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }

        @keyframes messageSlide {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .message-anim { animation: messageSlide 0.3s ease-out forwards; }
    </style>
</head>
<body class="bg-slate-100 min-h-screen flex flex-col">

    <header class="bg-white border-b border-gray-200 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 h-16 flex justify-between items-center">
            <a href="index.html" class="flex items-center gap-2 group">
                <img src="images/logo.png" onerror="this.style.display='none'" class="h-8 w-auto">
                <div class="text-3xl font-black text-sky-600 hb-logo">HB</div>
                <span class="text-lg font-bold text-gray-800">챗봇 상담</span>
            </a>
            <a href="index.html" class="text-gray-500 hover:text-black"><i class="fa-solid fa-xmark text-2xl"></i></a>
        </div>
    </header>

    <main class="flex-grow flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-md h-[700px] rounded-2xl shadow-2xl overflow-hidden flex flex-col border border-gray-200">
            
            <div class="bg-sky-600 p-4 flex items-center justify-between text-white shadow-md z-10">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 rounded-full bg-white p-1 overflow-hidden">
                        <img src="images/hyobin.png" onerror="this.src='https://placehold.co/100x100/sky/white?text=HB'" class="w-full h-full object-cover rounded-full">
                    </div>
                    <div>
                        <h2 class="font-bold text-lg leading-tight">효빈이 (AI 상담원)</h2>
                        <p class="text-xs text-sky-100 flex items-center"><span class="w-2 h-2 bg-green-400 rounded-full mr-1"></span>운영중</p>
                    </div>
                </div>
                <button onclick="location.reload()" class="text-sky-100 hover:text-white" title="대화 초기화"><i class="fa-solid fa-rotate-right"></i></button>
            </div>

            <div id="chat-box" class="flex-grow bg-slate-50 p-4 overflow-y-auto chat-scroll flex flex-col gap-4">
                
                <div class="text-center text-xs text-gray-400 my-2">
                    <span>오늘</span>
                </div>

                <div class="flex items-start gap-2 message-anim">
                    <div class="w-8 h-8 rounded-full bg-sky-100 flex-shrink-0 overflow-hidden border border-sky-200">
                        <img src="images/hyobin.png" onerror="this.src='https://placehold.co/100x100/sky/white?text=HB'" class="w-full h-full object-cover">
                    </div>
                    <div class="flex flex-col gap-1 max-w-[80%]">
                        <span class="text-xs text-gray-500 ml-1">효빈이</span>
                        <div class="bg-white p-3 rounded-2xl rounded-tl-none border border-gray-200 text-sm text-gray-800 shadow-sm">
                            안녕하세요! 효빈교통공사 AI 챗봇 <strong>'효빈이'</strong>입니다. 🚆<br>
                            무엇을 도와드릴까요?
                        </div>
                    </div>
                </div>

                <div class="flex items-start gap-2 message-anim">
                    <div class="w-8 h-8 flex-shrink-0"></div> <div class="max-w-[80%] flex flex-wrap gap-2">
                        <button onclick="sendQuickQuery('첫차/막차 시간 알려줘')" class="bg-white border border-sky-200 text-sky-600 text-xs font-bold px-3 py-2 rounded-full hover:bg-sky-50 transition shadow-sm">🕒 첫차/막차 시간</button>
                        <button onclick="sendQuickQuery('유실물 센터 위치는?')" class="bg-white border border-sky-200 text-sky-600 text-xs font-bold px-3 py-2 rounded-full hover:bg-sky-50 transition shadow-sm">🎒 유실물 찾기</button>
                        <button onclick="sendQuickQuery('노선도가 보고 싶어')" class="bg-white border border-sky-200 text-sky-600 text-xs font-bold px-3 py-2 rounded-full hover:bg-sky-50 transition shadow-sm">🗺️ 전체 노선도</button>
                        <button onclick="sendQuickQuery('통합 운임표 보여줘')" class="bg-white border border-sky-200 text-sky-600 text-xs font-bold px-3 py-2 rounded-full hover:bg-sky-50 transition shadow-sm">💳 통합 운임 안내</button>
                        <button onclick="sendQuickQuery('굿즈샵 어디 있어?')" class="bg-white border border-sky-200 text-sky-600 text-xs font-bold px-3 py-2 rounded-full hover:bg-sky-50 transition shadow-sm">🛍️ 굿즈샵 안내</button>
                    </div>
                </div>

            </div>

            <div class="bg-white p-3 border-t border-gray-200">
                <div class="flex items-center gap-2 bg-gray-100 rounded-full px-4 py-2 border border-gray-300 focus-within:border-sky-500 focus-within:ring-1 focus-within:ring-sky-500 transition">
                    <input type="text" id="user-input" class="bg-transparent flex-grow outline-none text-sm text-gray-800" placeholder="메시지를 입력하세요..." onkeypress="handleKeyPress(event)">
                    <button onclick="sendMessage()" class="text-sky-600 hover:text-sky-700 transition"><i class="fa-solid fa-paper-plane text-lg"></i></button>
                </div>
                <div class="text-center mt-2">
                    <p class="text-[10px] text-gray-400">상담 내용은 서비스 품질 향상을 위해 저장될 수 있습니다.</p>
                </div>
            </div>

        </div>
    </main>

    <script>
        const chatBox = document.getElementById('chat-box');
        const userInput = document.getElementById('user-input');

        // 스크롤을 맨 아래로
        function scrollToBottom() {
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        // 엔터키 입력 처리
        function handleKeyPress(e) {
            if (e.key === 'Enter') {
                sendMessage();
            }
        }

        // 퀵 메뉴 클릭 시
        function sendQuickQuery(text) {
            userInput.value = text;
            sendMessage();
        }

        // 메시지 전송
        function sendMessage() {
            const text = userInput.value.trim();
            if (text === "") return;

            // 1. 사용자 메시지 추가
            addMessage('user', text);
            userInput.value = '';

            // 2. 봇 응답 대기 (Typing 효과)
            setTimeout(() => {
                showTypingIndicator();
                
                // 3. 실제 응답 처리 (1초 후)
                setTimeout(() => {
                    removeTypingIndicator();
                    const botResponse = getBotResponse(text);
                    addMessage('bot', botResponse);
                }, 800);
            }, 300);
        }

        // 메시지 UI 추가
        function addMessage(sender, text) {
            const div = document.createElement('div');
            div.className = `flex items-start gap-2 message-anim ${sender === 'user' ? 'flex-row-reverse' : ''}`;
            
            let html = '';
            if (sender === 'bot') {
                html = `
                    <div class="w-8 h-8 rounded-full bg-sky-100 flex-shrink-0 overflow-hidden border border-sky-200">
                        <img src="images/hyobin.png" onerror="this.src='https://placehold.co/100x100/sky/white?text=HB'" class="w-full h-full object-cover">
                    </div>
                    <div class="flex flex-col gap-1 max-w-[80%] items-start">
                        <span class="text-xs text-gray-500 ml-1">효빈이</span>
                        <div class="bg-white p-3 rounded-2xl rounded-tl-none border border-gray-200 text-sm text-gray-800 shadow-sm leading-relaxed">
                            ${text}
                        </div>
                    </div>
                `;
            } else {
                html = `
                    <div class="flex flex-col gap-1 max-w-[80%] items-end">
                        <div class="bg-sky-500 p-3 rounded-2xl rounded-tr-none text-sm text-white shadow-md leading-relaxed">
                            ${text}
                        </div>
                    </div>
                `;
            }
            
            div.innerHTML = html;
            chatBox.appendChild(div);
            scrollToBottom();
        }

        // 타이핑 인디케이터 (쩜쩜쩜...)
        function showTypingIndicator() {
            const div = document.createElement('div');
            div.id = 'typing-indicator';
            div.className = 'flex items-start gap-2 message-anim';
            div.innerHTML = `
                <div class="w-8 h-8 rounded-full bg-sky-100 flex-shrink-0 overflow-hidden border border-sky-200">
                    <img src="images/hyobin.png" onerror="this.src='https://placehold.co/100x100/sky/white?text=HB'" class="w-full h-full object-cover">
                </div>
                <div class="bg-white p-3 rounded-2xl rounded-tl-none border border-gray-200 shadow-sm flex items-center gap-1">
                    <span class="w-1.5 h-1.5 bg-gray-400 rounded-full animate-bounce"></span>
                    <span class="w-1.5 h-1.5 bg-gray-400 rounded-full animate-bounce delay-100"></span>
                    <span class="w-1.5 h-1.5 bg-gray-400 rounded-full animate-bounce delay-200"></span>
                </div>
            `;
            chatBox.appendChild(div);
            scrollToBottom();
        }

        function removeTypingIndicator() {
            const indicator = document.getElementById('typing-indicator');
            if (indicator) indicator.remove();
        }

        // ★ 봇 응답 로직 (효빈권 통합운임 반영) ★
        function getBotResponse(input) {
            const text = input.toLowerCase();

            if (text.includes("안녕") || text.includes("반가")) {
                return "안녕하세요! 오늘도 효빈교통공사를 이용해 주셔서 감사합니다. 😊";
            } 
            else if (text.includes("시간") || text.includes("첫차") || text.includes("막차")) {
                return `
                    <strong>🕒 열차 운행 시간 안내</strong><br><br>
                    첫차와 막차 시간은 역마다 다릅니다.<br>
                    정확한 시간은 <strong>[실시간 열차운행정보]</strong> 메뉴에서 출발역을 검색하시면 확인 가능합니다.<br><br>
                    <a href="index.html#search-section" class="text-sky-600 font-bold underline">👉 실시간 정보 검색하러 가기</a>
                `;
            }
            else if (text.includes("유실물") || text.includes("분실") || text.includes("잃어")) {
                return `
                    <strong>🎒 유실물 센터 안내</strong><br><br>
                    물건을 잃어버리셨나요? 너무 걱정하지 마세요!<br>
                    유실물 센터 현황을 확인해보세요.<br><br>
                    📍 <strong>센터 위치:</strong> 1호선 창선역, 2호선 월천역<br>
                    <a href="lost_found.html" class="text-sky-600 font-bold underline">👉 유실물 센터 바로가기</a>
                `;
            }
            else if (text.includes("노선") || text.includes("지도")) {
                return `
                    <strong>🗺️ 전체 노선도 안내</strong><br><br>
                    효빈교통공사의 1~8호선 및 빈효선 전체 노선도를 확인하실 수 있습니다.<br><br>
                    <a href="map.html" class="text-sky-600 font-bold underline">👉 노선도 크게 보기</a>
                `;
            }
            // ★ 요금/운임/환승 관련 응답 수정됨 ★
            else if (text.includes("요금") || text.includes("운임") || text.includes("비용") || text.includes("환승")) {
                return `
                    <strong>💳 효빈권 통합 운임 안내 (기본요금)</strong><br><br>
                    효빈 도시철도(1~8호선), 빈효선, 시내버스는 <strong>통합요금제</strong>가 적용됩니다.<br><br>
                    - <strong>일반:</strong> 1,500원 (교통카드)<br>
                    - <strong>청소년:</strong> 850원<br>
                    - <strong>어린이:</strong> 550원<br><br>
                    🔄 <strong>환승 할인:</strong> 하차 후 30분 이내 (최대 4회)<br>
                    📈 <strong>거리비례:</strong><br>
                    · 10~50km: 5km마다 100원 추가<br>
                    · 50km 초과: 8km마다 100원 추가<br><br>
                    <a href="subway.html" class="text-sky-600 font-bold underline">👉 자세한 운임표 보기</a>
                `;
            }
            else if (text.includes("굿즈") || text.includes("매장") || text.includes("샵")) {
                return `
                    <strong>🛍️ 공식 굿즈샵 안내</strong><br><br>
                    효빈교통공사의 귀여운 캐릭터 굿즈를 만나보세요!<br>
                    본점, 공항점, 창선역점 등 다양한 곳에 매장이 있습니다.<br><br>
                    <a href="goods.html" class="text-sky-600 font-bold underline">👉 굿즈샵 위치/정보 보기</a>
                `;
            }
            else if (text.includes("민원") || text.includes("불편") || text.includes("신고") || text.includes("전화")) {
                return `
                    <strong>📞 고객센터 안내</strong><br><br>
                    챗봇으로 해결되지 않는 문제는 고객센터로 연락주세요.<br><br>
                    - <strong>전화/문자:</strong> 079-431-4723<br>
                    - <strong>운영시간:</strong> 09:00 ~ 18:00 (평일)
                `;
            }
            else if (text.includes("사랑") || text.includes("좋아")) {
                return "저도 고객님을 사랑합니다! 🥰 안전한 여행 되세요!";
            }
            else {
                return `
                    죄송합니다. 제가 이해하기 어려운 질문이네요. 😅<br>
                    아래 키워드로 다시 물어봐 주시겠어요?<br><br>
                    - 첫차/막차 시간<br>
                    - 유실물 찾기<br>
                    - 통합 운임 안내<br>
                    - 굿즈샵 위치
                `;
            }
        }
    </script>
</body>
</html>
