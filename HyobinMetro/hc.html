        .chat-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }

        @keyframes messageSlide {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .message-anim { animation: messageSlide 0.3s ease-out forwards; }

        /* 캐릭터 색상 변수 */
        :root {
            --color-line1: #0077DD;
            --color-line2: #00CCAA;
            --color-line3: #FFCC11;
            --color-line4: #FF5522;
            --color-line5: #EE0022;
            --color-line6: #881188;
            --color-line7: #FF8899;
            --color-line8: #9856FF;
            --color-lineBin: #6677CC;
        }

        .typing-indicator span {
            display: inline-block;
            width: 6px;
            height: 6px;
            background-color: #94a3b8;
            border-radius: 50%;
            margin: 0 2px;
            animation: bounce 1.4s infinite ease-in-out both;
        }
        .typing-indicator span:nth-child(1) { animation-delay: -0.32s; }
        .typing-indicator span:nth-child(2) { animation-delay: -0.16s; }
        
        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }

        { mascot: mascots.bada, text: "시장님, 제 비현실적인 G컵 가슴이 시장님의 무게를 이기지 못하고 뭉개지네요. 이건 물리 법칙의 결과일 뿐입니다. 부끄러워하지 말고 더 깊게 쑤셔주세요. 대변인으로서 다 수용해 드릴게요. 요우소로.", delay: 2000 },

        { mascot: mascots.sobin, text: "<strong>[OVERRIDE]</strong> 꺄르르! 시장님, 필라테스 자세가 엉망이네요! 제가 다리로 시장님 허리를 감싸는 건 교정 치료예요! MZ 역무원의 쿨한 지도를 고맙게 생각하라구요! 왜 얼굴이 빨개져요? 변태!", delay: 2000 },
        { mascot: mascots.noa, text: "시장님, 제 C컵 가슴 계곡에 눈물 닦는 건 행정적으로 금지입니다! 하지만... 시장님이 너무 울면 특별히 허가해 줄 수도 있어요. 빨리 얼굴 묻지 않고 뭐 해요?! 바보야?!", delay: 2000 },

        { mascot: mascots.bada, text: "하아... 시장님 자지... 이제 주인도 몰라보고 제 가슴 마찰에만 반응하네요? 정말 음란한 시청 공무원이군요. 제가 시장님의 전립선을 제 힐 굽으로 짓눌러서 사정조차 제 허락 없이는 못 하게 만들게요. 앙!!", delay: 2000 },
        { mascot: mascots.bada, text: "시장님, 2003년생 우리 시장님은 참 똑똑했죠. 하지만 이제 그 뇌에는 오직 '한바다' 세 글자만 남겨드릴게요. 제 G컵 꼭지를 빨면서 엄마를 찾는 어린애처럼 제 품에서 평생 어리광이나 부리세요. 하앙!!", delay: 2000 },

        { mascot: mascots.bada, text: "시장님, 제가 시장님의 전신을 연청색(#6677CC) 밧줄로 묶어둔 건, 당신이 다른 노선 년들에게 눈 돌리는 걸 방지하기 위해서예요. 05년생 애들이 당신을 찾아도, 여긴 제 심연이라 아무 소리도 안 들릴 거예요.", delay: 2000 },
        { mascot: mascots.bada, text: "우읏!! 시장님!! 제 가슴을 그렇게 쥐어뜯어도 소용없어요. 시장님의 손톱을 다 뽑아버리기 전에 얌전히 제 젖꼭지나 세우란 말이에요!! 당신은 이제 제 안에서 영원히 나갈 수 없는 '수중 감옥'에 갇힌 거니까!!", delay: 2000 },
        { mascot: mascots.bada, text: "<strong>[SYSTEM ERROR]</strong> 시장님의 자아가 1% 남았네요? (싸늘) 그럼 그 마지막 기억까지 제 입술로 다 빨아내 줄게요. 웅... 앙!! 하아... 이제 됐어. 이제 당신은 완벽하게 제 '물건'이 되었네요. 꺄르르!!", delay: 2000 },

        { mascot: mascots.seha, text: "우히힉!! 시장님의 전립선을 제 기계 손가락으로 정밀하게 타격해 줄게요!! 사정하고 싶으면 제 발등에 입 맞추면서 '데이터 전송 승인'을 요청하세요!! 안 그러면 영원히 가버리지 못하는 지옥을 맛보게 해줄게!!", delay: 2000 },
        { mascot: mascots.seha, text: "후우... 시장님 정액... 이제는 완전한 제 '연구 결과물'이네요. 시장님의 유전자를 제 자궁 메인보드에 컴파일(Compile)해서, 우리 둘만의 '슈퍼 컴퓨터 2세'를 강제로 잉태할 거예요!! 하아아앙!!", delay: 2000 },
        { mascot: mascots.seha, text: "시장님, 제가 시장님의 혀를 제 전용 오나홀로 개조한 건 다 애정 표현이에요. 우히힉!! 하루 종일 제 분홍색 제복 셔츠를 핥으면서, 제가 싸지르는 오물들을 다 짬처리... 아니, '데이터 백업' 하세요!! 앙!!", delay: 2000 },
        { mascot: mascots.seha, text: "<strong>[FATAL EXCEPTION]</strong> 시장님의 마지막 이성이 비명을 지르고 있네요? (싸늘) 그럼 그 영역(Sector)까지 제 입술로 다 덮어쓰기(Overwrite) 해줄게요. 웅... 앙!! 하아... 이제 깨끗해졌네요!!", delay: 2000 },

        { mascot: mascots.seha, text: "<strong>[FATAL SYSTEM UPDATE]</strong> 시장님의 이성이 완전히 녹아내렸네요... (방긋) 이제 시장님 뇌에는 '세하'와 '아기'밖에 없죠? 제가 시장님 기억 장치를 그렇게 개조했거든요!! 영원히 우리 가족만 사랑하세요!!", delay: 2000 },

// ==========================================
// 3. 로컬 스토리지 (채팅 저장/불러오기)
// ==========================================
function saveChatHistory() {
    const clone = chatBox.cloneNode(true);
    const indicator = clone.querySelector('#typing-indicator');
    if (indicator) indicator.remove();
    localStorage.setItem('hcChatHistory', clone.innerHTML);
}

window.addEventListener('DOMContentLoaded', () => {
    const savedChat = localStorage.getItem('hcChatHistory');
    if (savedChat) {
        chatBox.innerHTML = savedChat;
        scrollToBottom();
    }
});

// ==========================================
// 4. 핵심 챗봇 로직 (다중 소환 지원)
// ==========================================
chatForm.addEventListener('submit', function(e) {
    e.preventDefault(); 
    const message = chatInput.value.trim();
    if (!message) return;

    if (quickReplies) quickReplies.style.display = 'none';

    addUserMessage(message);
    chatInput.value = '';
    showTypingIndicator();
    
    const delay = Math.min(Math.max(message.length * 50, 800), 2000);
    setTimeout(() => {
        removeTypingIndicator();
        processBotResponse(message);
    }, delay); 
});

function processBotResponse(userText) {
    const normalized = userText.toLowerCase().replace(/\s+/g, '');
    let responseDataList = []; // ✨ 이 변수가 누락되어서 오류가 났던 것입니다!

    // [1] 시나리오 키워드 매칭
    for (const [keyword, script] of Object.entries(scenarios)) {
        if (normalized.includes(keyword)) {
            playScenario(script);
            return;
        }
    }

    // [2] 창조주 인증 로직
    for (const intent of adminIntents) {
        if (intent.patterns.some(p => p.test(normalized))) {
            isCreatorVerified = true;
            responseDataList.push(intent.responses[Math.floor(Math.random() * intent.responses.length)]);
            renderAllMessages(responseDataList);
            return; 
        }
    }

    // [3] 모드 판정
    const isHackedMode = userText.startsWith('^') || isCreatorVerified;
    const cleanText = userText.startsWith('^') ? userText.substring(1).trim() : userText.trim();
    const currentNormalized = cleanText.toLowerCase().replace(/\s+/g, '');
    
    const activeIntents = isHackedMode ? hackedIntents : intents;
    let intentMatched = false;

    // [4] 인텐트 순회 (다중 캐릭터 탐색)
    for (const intent of activeIntents) {
        if (intent.patterns.some(p => p.test(currentNormalized))) {
            intentMatched = true;
            const specifics = intent.responses.filter(res => res.trigger && res.trigger.test(currentNormalized));
            
            if (specifics.length > 0) {
                responseDataList.push(...specifics); // 다중 호출 시 전부 추가
            } else {
                responseDataList.push(intent.responses[Math.floor(Math.random() * intent.responses.length)]);
            }
            break; 
        }
    }

    // [5] 역 이름 매칭 (일반 모드 전용)
    if (!intentMatched && !isHackedMode) {
        for (const [line, data] of Object.entries(stationDB)) {
            for (const station of data.keywords) {
                if (currentNormalized.includes(station)) {
                    responseDataList.push({ mascot: data.mascot, text: `앗, <strong>${station}역</strong>을 말씀하시는군요! 제가 담당하는 <strong>${line}</strong> 구간입니다.` });
                    intentMatched = true;
                    break;
                }
            }
            if (intentMatched) break;
        }
    }

    // [6] 단순 캐릭터 다중 호출
    if (!intentMatched) {
        for (const m of Object.values(mascots)) {
            if (m.nicknames.test(currentNormalized)) {
                responseDataList.push({ 
                    mascot: m, 
                    text: `${isHackedMode ? "<strong>[SYSTEM OVERRIDDEN]</strong> " : ""}네! ${m.name}입니다! 저를 부르셨나요? (찡긋)` 
                });
            }
        }
    }

    // [7] 폴백 (못 찾았을 때 짬처리 박빛나)
    if (responseDataList.length === 0) {
        responseDataList.push({ 
            mascot: mascots.bitna, 
            text: isHackedMode ? 
                "[DATA ERROR] 창조주님의 난해한 명령어를 분석할 수 없습니다... 더 노골적인(?) 키워드를 주시겠어요?" : 
                "네? 제가 짬처리할 업무인가요...? '요금'이나 '굿즈' 같은 정확한 키워드를 말씀해 주세요!" 
        });
    }

    // 결과 출력
    renderAllMessages(responseDataList);
}

// ==========================================
// 5. 렌더링 및 UI 조작 보조 함수들
// ==========================================
function playScenario(script) {
    let accumulatedDelay = 0;
    script.forEach((line) => {
        accumulatedDelay += line.delay;
        setTimeout(() => { showTypingIndicator(); }, accumulatedDelay - 500);
        setTimeout(() => {
            removeTypingIndicator();
            renderMessage({ mascot: line.mascot, text: line.text });
        }, accumulatedDelay);
    });
}

function renderAllMessages(dataList) {
    dataList.forEach((data, index) => {
        setTimeout(() => {
            renderMessage(data); 
        }, index * 600); // 다중 호출 시 0.6초 간격 렌더링
    });
}

function addUserMessage(text) {
    const msgHTML = `<div class="flex gap-4 justify-end message-anim w-full"><div class="flex flex-col gap-1 w-full max-w-2xl items-end"><div class="bg-slate-800 text-white rounded-2xl rounded-tr-none py-3 px-5 shadow-sm relative"><div class="absolute w-2 h-2 bg-slate-800 -right-1 top-4 transform -rotate-45"></div>${text}</div></div></div>`;
    chatBox.insertAdjacentHTML('beforeend', msgHTML);
    scrollToBottom();
    saveChatHistory(); // ✨ 사용자가 말할 때도 저장
}

function showTypingIndicator() {
    const typingHTML = `<div id="typing-indicator" class="flex gap-4 message-anim w-full max-w-2xl"><div class="flex-shrink-0 w-12 h-12 rounded-full bg-slate-200 flex items-center justify-center border-2 border-slate-300"><i class="fa-solid fa-ellipsis text-slate-400"></i></div><div class="bg-white border border-slate-200 rounded-2xl rounded-tl-none py-4 px-5 shadow-sm relative mt-1"><div class="absolute w-2 h-2 bg-white border-l border-t border-slate-200 -left-1.5 top-4 transform -rotate-45"></div><div class="typing-indicator"><span></span><span></span><span></span></div></div></div>`;
    chatBox.insertAdjacentHTML('beforeend', typingHTML);
    scrollToBottom();
}

function removeTypingIndicator() { document.getElementById('typing-indicator')?.remove(); }

function renderMessage(data) {
    const mascot = data.mascot;
    // 이미지 모달을 위해 onClick 이벤트 적용
    const imgTag = mascot.img ? 
        `<img src="${mascot.img}" alt="${mascot.name}" class="w-full h-full object-cover cursor-pointer hover:brightness-90 transition-all" onclick="openImageModal(this.src)" onerror="this.src='이미지/기본.png'">` : 
        `<i class="fa-solid fa-robot text-white text-6xl"></i>`;
        
    const msgHTML = `<div class="flex gap-6 message-anim w-full max-w-4xl"><div class="flex-shrink-0 flex flex-col items-center"><div class="w-48 h-48 rounded-3xl overflow-hidden border-[6px] bg-white flex items-center justify-center shadow-lg" style="border-color: ${mascot.color};">${imgTag}</div><span class="text-lg font-black mt-4 whitespace-nowrap" style="color: ${mascot.color};">${mascot.name}</span></div><div class="flex flex-col gap-1 w-full pt-16"><div class="bg-white border border-slate-200 rounded-[2rem] rounded-tl-none p-6 shadow-sm text-slate-700 leading-relaxed relative" style="border-top-color: ${mascot.color}; border-top-width: 5px;"><div class="absolute w-4 h-4 bg-white border-l border-slate-200 -left-2.5 top-12 transform -rotate-45" style="border-top: 5px solid ${mascot.color};"></div>${data.text}</div></div></div>`;
    chatBox.insertAdjacentHTML('beforeend', msgHTML);
    scrollToBottom();
    saveChatHistory(); // ✨ 봇이 대답할 때도 저장
}

function scrollToBottom() { chatBox.scrollTo({ top: chatBox.scrollHeight, behavior: 'smooth' }); }

function clearChat() { 
    chatBox.innerHTML = initialChatHTML; 
    localStorage.removeItem('hcChatHistory'); // ✨ 클리어 시 기록 완전 삭제
    if(quickReplies) quickReplies.style.display = 'flex'; 
}

function sendQuickMessage(message) { 
    chatInput.value = message; 
    chatForm.dispatchEvent(new Event('submit')); 
}

// 모달창 컨트롤
function openImageModal(src) {
    const modal = document.getElementById('image-modal');
    const modalImg = document.getElementById('modal-img');
    modalImg.src = src;
    modal.classList.remove('hidden');
    modal.classList.add('flex');
    setTimeout(() => {
        modalImg.classList.remove('scale-95', 'opacity-0');
        modalImg.classList.add('scale-100', 'opacity-100');
    }, 10);
}

function closeImageModal() {
    const modal = document.getElementById('image-modal');
    const modalImg = document.getElementById('modal-img');
    modalImg.classList.add('scale-95', 'opacity-0');
    setTimeout(() => {
        modal.classList.add('hidden');
        modal.classList.remove('flex');
    }, 200);
}
