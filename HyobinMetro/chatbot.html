        body { font-family: 'Noto Sans KR', sans-serif; background-color: #f8fafc; }
        
        .chat-scroll::-webkit-scrollbar { width: 6px; }
        .chat-scroll::-webkit-scrollbar-track { background: transparent; }
        .chat-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }

        @keyframes messageSlide {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .message-anim { animation: messageSlide 0.3s ease-out forwards; }

        /* 캐릭터 색상 변수 */
        :root {
            --color-line1: #0077DD;
            --color-line2: #00CCAA;
            --color-line3: #FFCC11;
            --color-line4: #FF5522;
            --color-line5: #EE0022;
            --color-line6: #881188;
            --color-line7: #FF8899;
            --color-line8: #9856FF;
            --color-lineBin: #6677CC;
        }

        .typing-indicator span {
            display: inline-block;
            width: 6px;
            height: 6px;
            background-color: #94a3b8;
            border-radius: 50%;
            margin: 0 2px;
            animation: bounce 1.4s infinite ease-in-out both;
        }
        .typing-indicator span:nth-child(1) { animation-delay: -0.32s; }
        .typing-indicator span:nth-child(2) { animation-delay: -0.16s; }
        
        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }
        /* 스크롤바 스타일 수정 */
.chat-scroll {
    overflow-y: auto;
    /* 파이어폭스용 */
    scrollbar-width: thin;
    scrollbar-color: #cbd5e1 transparent;
}

/* 크롬, 사파리, 엣지용 */
.chat-scroll::-webkit-scrollbar {
    width: 6px;
}

.chat-scroll::-webkit-scrollbar-track {

}

.chat-scroll::-webkit-scrollbar-thumb {

}

.chat-scroll::-webkit-scrollbar-thumb:hover {
    background: #94a3b8; /* 마우스 올렸을 때 더 진하게 */
}

// 초기 HTML 보관용
const initialChatHTML = chatBox.innerHTML;

chatForm.addEventListener('submit', function(e) {
    e.preventDefault();
    const message = chatInput.value.trim();
    if (!message) return;

    // ✨ 이스터에그: "|" 입력 시 hc.html로 이동
    if (message === '|') {
        window.location.href = 'hc.html';
        return; // 아래의 메시지 전송 로직이 실행되지 않도록 종료
    }

    if(quickReplies) quickReplies.style.display = 'none';

    addUserMessage(message);
    chatInput.value = '';


    const delay = Math.min(Math.max(message.length * 50, 800), 2000);

    setTimeout(() => {
        removeTypingIndicator();
        processBotResponse(message); // 함수명을 명확하게 변경
    }, delay); 
});

function sendQuickMessage(message) {
    chatInput.value = message;
    chatForm.dispatchEvent(new Event('submit'));
}

function addUserMessage(text) {
    const msgHTML = `
        <div class="flex gap-4 justify-end message-anim w-full">
            <div class="flex flex-col gap-1 w-full max-w-2xl items-end">
                <div class="bg-slate-800 text-white rounded-2xl rounded-tr-none py-3 px-5 shadow-sm leading-relaxed relative">
                    <div class="absolute w-2 h-2 bg-slate-800 -right-1 top-4 transform -rotate-45"></div>
                    ${text}
                </div>
            </div>
        </div>
    `;
    chatBox.insertAdjacentHTML('beforeend', msgHTML);
    scrollToBottom();
}

function showTypingIndicator() {
    const typingHTML = `
        <div id="typing-indicator" class="flex gap-4 message-anim w-full max-w-2xl">
            <div class="flex-shrink-0 w-12 h-12 rounded-full bg-slate-200 flex items-center justify-center border-2 border-slate-300 shadow-sm">
                <i class="fa-solid fa-ellipsis text-slate-400 text-xl"></i>
            </div>
            <div class="bg-white border border-slate-200 rounded-2xl rounded-tl-none py-4 px-5 shadow-sm relative flex items-center h-12 mt-1">
                <div class="absolute w-2 h-2 bg-white border-l border-t border-slate-200 -left-1.5 top-4 transform -rotate-45"></div>
                <div class="typing-indicator">
                    <span></span><span></span><span></span>
                </div>
            </div>
        </div>
    `;
    chatBox.insertAdjacentHTML('beforeend', typingHTML);
    scrollToBottom();
}

function removeTypingIndicator() {
    const indicator = document.getElementById('typing-indicator');
    if (indicator) indicator.remove();
}

// 핵심 로직: 메시지를 분석하여 응답 데이터 생성
function processBotResponse(userText) {
    let responseData = null;
    const normalizedText = userText.toLowerCase().replace(/\s+/g, '');

    // 1. 인텐트(의도) 매칭 및 캐릭터 트리거 확인
    for (const intent of intents) {
        if (intent.patterns.some(regex => regex.test(normalizedText))) {
            const matchedResponse = intent.responses.find(res => 
                res.trigger && res.trigger.test(normalizedText)
            );
            responseData = matchedResponse || intent.responses[Math.floor(Math.random() * intent.responses.length)];
            break;
        }
    }

    // 2. 역 이름 매칭 (Lore 데이터)
    if (!responseData) {
        for (const [line, data] of Object.entries(stationDB)) {
            for (const station of data.keywords) {
                if (normalizedText.includes(station)) {
                    responseData = {
                        mascot: data.mascot,
                        text: `앗, <strong>${station}역</strong>을 말씀하시는군요! 그곳은 제가 담당하는 <strong>${line}</strong> 구간입니다.<br><br>해당 역의 정보가 더 필요하신가요?`
                    };
                    break;
                }
            }
            if (responseData) break;
        }
    }

    // 3. 캐릭터 이름 직접 호출
    if (!responseData) {
        for (const [key, data] of Object.entries(mascots)) {
            if (data.nicknames && data.nicknames.test(normalizedText)) {
                responseData = {
                    mascot: data,
                    text: `네! ${data.name}입니다! 저를 부르셨나요? (찡긋)`
                };
                break;
            }
        }
    }

    // 4. 폴백 (모를 때)
    if (!responseData) {
        const fallbacks = [
            { mascot: mascots.harubin, text: "고객님~ 그건 제가 퇴근 전이라... 아니, 제 권한 밖이네요! 다른 키워드로 물어봐 주세요~" },
            { mascot: mascots.noa, text: "아앗! 이 기안서는 제 결재 라인이 아니에요! '요금'이나 '굿즈' 같은 핵심 키워드를 써주세요!" }
        ];
        responseData = fallbacks[Math.floor(Math.random() * fallbacks.length)];
    }

    renderMessage(responseData);
}

// 최종 화면 렌더링 함수

    // 이미지 경로 및 폴백 아이콘 처리

function scrollToBottom() {
    chatBox.scrollTo({
        top: chatBox.scrollHeight,
        behavior: 'smooth'
    });
}

function clearChat() {
    chatBox.innerHTML = initialChatHTML;
    if(quickReplies) quickReplies.style.display = 'flex';
}        // chatbot.html 내의 응답 생성 함수 수정 예시
// chatbot.html의 스크립트 영역에 적용할 로직
function addBotResponse(userText) {
    let responseData = null;
    const normalizedText = userText.toLowerCase().replace(/\s+/g, ''); // 공백 제거 및 소문자화

    // 1. 모든 인텐트(의도)를 순회하며 매칭 확인
    for (const intent of intents) {
        if (intent.patterns.some(regex => regex.test(normalizedText))) {
            
            // 2. 해당 인텐트 내에서 특정 캐릭터의 'trigger'가 일치하는지 확인
            // 예: "고나미" 언급 시 responses 배열 중 고나미 trigger를 가진 항목 탐색
            const matchedResponse = intent.responses.find(res => 
                res.trigger && res.trigger.test(normalizedText)
            );

            if (matchedResponse) {
                // 이름이 언급되었다면 해당 캐릭터의 전용 응답 선택
                responseData = matchedResponse;
            } else {
                // 이름 언급 없이 의도만 있다면(예: 그냥 "예쁘다") 무작위 캐릭터 선택
                const randomIndex = Math.floor(Math.random() * intent.responses.length);
                responseData = intent.responses[randomIndex];
            }
            break; // 일치하는 인텐트를 찾았으므로 종료
        }
    }

    // 3. 어떤 인텐트에도 걸리지 않았을 때 (기본값)
    if (!responseData) {
        responseData = { 
            mascot: mascots.harubin, 
            text: "고객님~ 말씀하신 내용은 제가 퇴근 전이라... (방긋)<br>정확한 키워드나 캐릭터 이름을 말씀해 주시면 깐깐한 선배님들을 불러드릴게요!" 
        };
    }

    // 4. 최종 메시지 렌더링 호출 (기존 UI 로직 사용)
    renderBotMessage(responseData);
}
