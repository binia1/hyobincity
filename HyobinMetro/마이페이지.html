<!DOCTYPE html>
<html lang="ko">
<head>
    <link rel="icon" href="이미지/logo.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>마이페이지 - 효빈교통공사 굿즈샵</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans KR', sans-serif; }
        
        /* 캐릭터별 테마 색상 (효빈교통공사 공식 컬러코드) */
        .bg-line-1 { background-color: #0077DD; }
        .bg-line-2 { background-color: #00CCAA; }
        .bg-line-3 { background-color: #FFCC11; color: black; }
        .bg-line-4 { background-color: #FF5522; }
        .bg-line-5 { background-color: #EE0022; }
        .bg-line-6 { background-color: #881188; }
        .bg-line-7 { background-color: #FF8899; }
        .bg-line-8 { background-color: #9856FF; }
        .bg-line-bh { background-color: #6677CC; }

        /* 모달 애니메이션 */
        .modal-overlay { transition: opacity 0.3s ease; }
        .modal-overlay.hidden { opacity: 0; pointer-events: none; }
        .modal-overlay:not(.hidden) { opacity: 1; pointer-events: auto; }
        .modal-content { transform: scale(0.95); transition: transform 0.3s ease; }
        .modal-overlay:not(.hidden) .modal-content { transform: scale(1); }
        
        /* 나무위키식 취소선 드립용 스타일 */
        del { color: #9ca3af; text-decoration-color: #ef4444; text-decoration-thickness: 2px; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen flex flex-col">

    

    <main class="max-w-7xl mx-auto px-4 py-10 flex-grow w-full flex flex-col md:flex-row gap-8">
        
        <aside class="w-full md:w-1/4 flex flex-col gap-6">
            <div class="bg-white rounded-2xl shadow-sm border border-gray-200 p-6">
                <div class="flex items-center gap-4 mb-4 border-b border-gray-100 pb-4">
                    <div class="w-16 h-16 rounded-full bg-slate-800 flex items-center justify-center text-white text-2xl font-black shadow-inner">
                        HB
                    </div>
                    <div>
                        <h2 class="text-xl font-black text-gray-900">효빈 <span class="text-sm font-normal text-gray-500">님</span></h2>
                        <span id="user-tier-badge" class="inline-block mt-1 px-2 py-1 bg-gray-400 text-white text-[10px] font-bold rounded-full shadow-sm">
                            계산 중...
                        </span>
                    </div>
                </div>
                <div class="grid grid-cols-2 gap-4 text-center">
                    <div class="bg-gray-50 p-3 rounded-xl border border-gray-100">
                        <p class="text-xs text-gray-500 font-bold mb-1">보유 마일리지</p>
                        <p id="user-mileage" class="text-lg font-black text-sky-600">0 P</p>
                    </div>
                    <div class="bg-gray-50 p-3 rounded-xl border border-gray-100">
                        <p class="text-xs text-gray-500 font-bold mb-1">할인 쿠폰</p>
                        <p class="text-lg font-black text-red-500">3 장</p>
                    </div>
                </div>
            </div>

            <div class="bg-white rounded-2xl shadow-sm border border-gray-200 overflow-hidden">
                <div class="bg-gray-50 px-6 py-4 border-b border-gray-200">
                    <h3 class="font-black text-gray-800">나의 쇼핑 정보</h3>
                </div>
<ul class="flex flex-col">
    <li><a href="마이페이지.html" class="flex items-center justify-between px-6 py-4 border-b border-gray-100 hover:bg-sky-50 transition text-sky-600 font-bold"><span>주문/배송 조회</span><i class="fa-solid fa-chevron-right text-sm"></i></a></li>
    <li>
        <button onclick="openWishlistModal()" class="w-full flex items-center justify-between px-6 py-4 border-b border-gray-100 hover:bg-pink-50 transition text-gray-700 font-medium group">
            <span class="group-hover:text-pink-600 transition">위시리스트 (찜목록)</span>
            <i class="fa-solid fa-heart text-sm text-gray-300 group-hover:text-pink-500 transition"></i>
        </button>
    </li>
    <li><a href="최애측정도.html" class="flex items-center justify-between px-6 py-4 border-b border-gray-100 hover:bg-pink-50 transition text-gray-700 font-medium group"><span class="group-hover:text-pink-600 transition">나의 최애 측정도</span><i class="fa-solid fa-chart-pie text-sm text-gray-300 group-hover:text-pink-500 transition"></i></a></li>
    <li><a href="취소교환반품.html" class="flex items-center justify-between px-6 py-4 border-b border-gray-100 hover:bg-gray-50 transition text-gray-700 font-medium"><span>취소/교환/반품 내역</span><i class="fa-solid fa-chevron-right text-sm text-gray-300"></i></a></li>
</ul>            </div>
        </aside>

        <section class="w-full md:w-3/4 flex flex-col gap-6">
            
            <div class="flex justify-between items-end border-b-2 border-gray-900 pb-3">
                <div>
                    <h1 class="text-2xl font-black text-gray-900">주문/배송 조회</h1>
                    <p class="text-sm text-gray-500 mt-1">최근 주문하신 상품의 상태를 확인합니다.</p>
                </div>
            </div>

            <div id="order-list-container" class="flex flex-col gap-6">
                </div>
        </section>
    </main>

    

    <div id="tracking-modal" class="fixed inset-0 z-[150] hidden modal-overlay" role="dialog">
        <div class="absolute inset-0 bg-black/60 backdrop-blur-sm" onclick="closeTrackingModal()"></div>
        <div class="relative flex items-center justify-center min-h-screen p-4 pointer-events-none">
            <div class="modal-content bg-white w-full max-w-lg rounded-2xl shadow-2xl overflow-hidden pointer-events-auto">
                <div class="bg-sky-600 px-6 py-4 flex justify-between items-center">
                    <h3 class="text-white font-black text-lg">실시간 배송조회</h3>
                    <button onclick="closeTrackingModal()" class="text-white/80 hover:text-white transition">
                        <i class="fa-solid fa-xmark text-xl"></i>
                    </button>
                </div>
                <div class="p-6">
                    <div class="text-center mb-8">
                        <p class="text-sm text-gray-500 mb-1">주문번호 <span id="modal-order-id" class="font-bold text-gray-800"></span></p>
                        <p class="text-xl font-black text-sky-600">현재 상품이 <span class="text-gray-900">'배송중'</span> 입니다.</p>
                    </div>
                    <div class="relative flex justify-between items-center mb-10 px-4">
                        <div class="absolute left-8 right-8 top-1/2 h-1 bg-gray-200 -z-10 -translate-y-1/2"></div>
                        <div class="absolute left-8 right-1/4 top-1/2 h-1 bg-sky-500 -z-10 -translate-y-1/2"></div>
                        <div class="flex flex-col items-center gap-2"><div class="w-8 h-8 rounded-full bg-sky-500 text-white flex items-center justify-center text-sm shadow-md"><i class="fa-solid fa-check"></i></div><span class="text-xs font-bold text-gray-800">결제완료</span></div>
                        <div class="flex flex-col items-center gap-2"><div class="w-8 h-8 rounded-full bg-sky-500 text-white flex items-center justify-center text-sm shadow-md"><i class="fa-solid fa-box"></i></div><span class="text-xs font-bold text-gray-800">상품준비</span></div>
                        <div class="flex flex-col items-center gap-2"><div class="w-8 h-8 rounded-full bg-sky-500 text-white flex items-center justify-center text-sm shadow-md ring-4 ring-sky-100"><i class="fa-solid fa-truck-fast"></i></div><span class="text-xs font-bold text-sky-600">배송중</span></div>
                        <div class="flex flex-col items-center gap-2"><div class="w-8 h-8 rounded-full bg-gray-200 text-gray-400 flex items-center justify-center text-sm"><i class="fa-solid fa-house"></i></div><span class="text-xs font-bold text-gray-400">배송완료</span></div>
                    </div>
                    <div class="border border-gray-200 rounded-xl overflow-hidden">
                        <table class="w-full text-sm text-left">
                            <thead class="bg-gray-50 border-b border-gray-200 text-gray-500">
                                <tr><th class="px-4 py-2 font-bold">시간</th><th class="px-4 py-2 font-bold">현재위치</th><th class="px-4 py-2 font-bold">배송상태</th></tr>
                            </thead>
                            <tbody>
                                <tr class="border-b border-gray-100 bg-sky-50/30">
                                    <td class="px-4 py-3 text-gray-800">최근</td><td class="px-4 py-3 font-bold text-sky-600">효빈터미널</td><td class="px-4 py-3 text-gray-600">배송출발 (담당기사: 고나미)</td>
                                </tr>
                                <tr class="border-b border-gray-100"><td class="px-4 py-3 text-gray-500">1일 전</td><td class="px-4 py-3 text-gray-800">효빈물류센터</td><td class="px-4 py-3 text-gray-500">간선상차</td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>
                <div class="p-4 bg-gray-50 border-t border-gray-200">
                    <button onclick="closeTrackingModal()" class="w-full py-3 bg-gray-800 text-white font-bold rounded-xl hover:bg-gray-900 transition shadow-md">확인</button>
                </div>
            </div>
        </div>
    </div>

    <div id="wishlist-modal" class="fixed inset-0 z-[160] hidden modal-overlay" role="dialog">
        <div class="absolute inset-0 bg-black/60 backdrop-blur-sm" onclick="closeWishlistModal()"></div>
        <div class="relative flex items-center justify-center min-h-screen p-4 pointer-events-none">
            <div class="modal-content bg-white w-full max-w-2xl rounded-2xl shadow-2xl overflow-hidden pointer-events-auto flex flex-col max-h-[80vh]">
                <div class="bg-pink-500 px-6 py-4 flex justify-between items-center shrink-0">
                    <h3 class="text-white font-black text-lg"><i class="fa-solid fa-heart mr-2"></i>위시리스트 (찜목록)</h3>
                    <button onclick="closeWishlistModal()" class="text-white/80 hover:text-white transition">
                        <i class="fa-solid fa-xmark text-xl"></i>
                    </button>
                </div>
                <div class="p-6 overflow-y-auto flex-grow bg-gray-50" id="wishlist-container">
                    </div>
            </div>
        </div>
    </div>


    <script>
        const ORDER_KEY = "hyo_goods_orders_v1";
        const WISHLIST_KEY = "hyo_goods_wishlist_v1";

        function won(n){ return (Math.max(0, Math.round(n))).toLocaleString("ko-KR") + "원"; }

        // --- 프로필 등급 및 마일리지 계산 기능 ---
        function updateProfile() {
            const orders = JSON.parse(localStorage.getItem(ORDER_KEY) || "[]");
            const totalSpent = orders.reduce((sum, order) => sum + order.totals.total, 0);

            let tier = "일반 시민";
            let colorClass = "from-gray-400 to-gray-500";
            let drip = "<del class='text-white/70 text-[8px] decoration-white'>지갑 방어 성공</del>";

            if (totalSpent >= 200000) {
                tier = "VVIP 등급";
                colorClass = "from-purple-500 to-pink-500";
                drip = "<del class='text-white/70 text-[8px] decoration-white'>최고의 호갱님</del>";
            } else if (totalSpent >= 50000) {
                tier = "VIP 등급";
                colorClass = "from-sky-500 to-blue-500";
                drip = "<del class='text-white/70 text-[8px] decoration-white'>우수 납세자</del>";
            }

            // 5% 마일리지 적립
            const mileage = Math.floor(totalSpent * 0.05);

            document.getElementById("user-tier-badge").className = `inline-block mt-1 px-2 py-1 bg-gradient-to-r ${colorClass} text-white text-[10px] font-bold rounded-full shadow-sm`;
            document.getElementById("user-tier-badge").innerHTML = `${tier} ${drip}`;
            document.getElementById("user-mileage").textContent = mileage.toLocaleString("ko-KR") + " P";
        }

        // --- 주문 내역 렌더링 기능 ---
        function renderOrders() {
            const orders = JSON.parse(localStorage.getItem(ORDER_KEY) || "[]");
            const container = document.getElementById("order-list-container");

            if (orders.length === 0) {
                container.innerHTML = `
                    <div class="bg-white rounded-2xl border border-gray-200 shadow-sm p-16 text-center">
                        <i class="fa-solid fa-box-open text-5xl text-gray-200 mb-4"></i>
                        <h3 class="text-xl font-bold text-gray-800 mb-2">결제 내역이 없습니다.</h3>
                        <p class="text-gray-500 mb-6">아직 지갑이 무사합니다. <del>하지만 곧 털리게 될 겁니다.(...)</del></p>
                        <a href="new_arrival.html" class="px-6 py-3 bg-sky-600 text-white font-bold rounded-xl hover:bg-sky-700 transition">덕질 시작하기</a>
                    </div>
                `;
                return;
            }

            let html = "";
            orders.forEach(order => {
                const firstItem = order.lines[0];
                const extraCount = order.lines.length - 1;
                const titleText = extraCount > 0 ? `${firstItem.title} 외 ${extraCount}건` : firstItem.title;
                const dateStr = new Date(order.createdAt).toLocaleDateString('ko-KR');
                const totalQty = order.lines.reduce((acc, item) => acc + item.qty, 0);

                html += `
                    <div class="bg-white rounded-2xl border border-gray-200 shadow-sm overflow-hidden">
                        <div class="bg-gray-50 px-6 py-3 border-b border-gray-200 flex justify-between items-center">
                            <div class="flex items-center gap-4">
                                <span class="font-black text-gray-800">${dateStr}</span>
                                <span class="text-sm text-gray-500 border-l border-gray-300 pl-4">주문번호 : <span class="text-sky-600 font-medium">${order.orderId}</span></span>
                            </div>
                        </div>
                        <div class="p-6 flex flex-col md:flex-row gap-6 items-center">
                            <div class="relative w-28 h-28 flex-shrink-0 bg-gray-100 rounded-xl border border-gray-200 overflow-hidden">
                                <img src="${firstItem.img}" class="w-full h-full object-cover" onerror="this.src='https://placehold.co/200x200?text=No+Img'">
                            </div>
                            <div class="flex-grow text-center md:text-left">
                                <h3 class="text-lg font-bold text-gray-900 mb-2">${titleText}</h3>
                                <p class="text-sm text-gray-500 mb-2">총 수량: ${totalQty}개</p>
                                <p class="text-xl font-black text-gray-900">${won(order.totals.total)}</p>
                            </div>
                            <div class="flex flex-col gap-2 min-w-[120px]">
                                <p class="text-center font-black text-sky-600 text-lg mb-1">${order.status}</p>
                                <button onclick="openTrackingModal('${order.orderId}')" class="w-full px-4 py-2 bg-white border border-sky-600 text-sky-600 font-bold rounded-lg hover:bg-sky-50 transition shadow-sm">
                                    배송조회
                                </button>
                            </div>
                        </div>
                    </div>
                `;
            });
            container.innerHTML = html;
        }

        // --- 위시리스트 모달 기능 ---
        function openWishlistModal() {
            document.getElementById('wishlist-modal').classList.remove('hidden');
            document.body.style.overflow = 'hidden';
            renderWishlist();
        }

        function closeWishlistModal() {
            document.getElementById('wishlist-modal').classList.add('hidden');
            document.body.style.overflow = '';
        }

        function renderWishlist() {
            // 로컬 스토리지 확인 후 비어있으면 기본값(테스트용) 세팅
            let wishlist = JSON.parse(localStorage.getItem(WISHLIST_KEY) || "[]");
            if (wishlist.length === 0) {
                wishlist = [
                    { id: "item_neso_yuria", title: "네소베리 유리아", price: 12000, img: "이미지/유리아네소베리.png" },
                    { id: "item_fig_miso", title: "1/7 스케일 피규어 미소하", price: 53000, img: "이미지/미소하네소베리.png" }
                ];
                localStorage.setItem(WISHLIST_KEY, JSON.stringify(wishlist));
            }

            const container = document.getElementById("wishlist-container");
            
            if (wishlist.length === 0) {
                container.innerHTML = `<div class="text-center py-10 text-gray-500">찜한 상품이 없습니다.</div>`;
                return;
            }

            let html = '<div class="grid grid-cols-1 sm:grid-cols-2 gap-4">';
            wishlist.forEach(item => {
                html += `
                    <div class="flex items-center gap-4 p-4 border border-gray-200 rounded-xl hover:shadow-md transition bg-white">
                        <img src="${item.img}" class="w-20 h-20 object-cover rounded-lg bg-gray-100" onerror="this.src='https://placehold.co/100x100?text=No+Img'">
                        <div class="flex-grow">
                            <h4 class="font-bold text-gray-900 text-sm mb-1 line-clamp-2">${item.title}</h4>
                            <p class="font-black text-pink-600">${won(item.price)}</p>
                        </div>
                        <div class="flex flex-col gap-2 shrink-0">
                            <button class="w-8 h-8 flex items-center justify-center rounded-full bg-pink-50 text-pink-500 hover:bg-pink-100 transition" onclick="removeWishlist('${item.id}')" title="찜 해제">
                                <i class="fa-solid fa-heart"></i>
                            </button>
                            <button class="w-8 h-8 flex items-center justify-center rounded-full bg-gray-50 text-gray-600 hover:bg-sky-50 hover:text-sky-600 transition" title="장바구니 담기">
                                <i class="fa-solid fa-cart-plus"></i>
                            </button>
                        </div>
                    </div>
                `;
            });
            html += '</div>';
            container.innerHTML = html;
        }

        function removeWishlist(id) {
            let wishlist = JSON.parse(localStorage.getItem(WISHLIST_KEY) || "[]");
            wishlist = wishlist.filter(item => item.id !== id);
            localStorage.setItem(WISHLIST_KEY, JSON.stringify(wishlist));
            renderWishlist(); // 삭제 후 즉시 재렌더링
        }

        // --- 배송조회 모달 기능 ---
        function openTrackingModal(orderId) {
            document.getElementById('modal-order-id').textContent = orderId;
            document.getElementById('tracking-modal').classList.remove('hidden');
            document.body.style.overflow = 'hidden';
        }

        function closeTrackingModal() {
            document.getElementById('tracking-modal').classList.add('hidden');
            document.body.style.overflow = '';
        }

        // ESC 키로 모달 닫기 공통 처리
        document.addEventListener('keydown', function(event) {
            if (event.key === "Escape") {
                closeTrackingModal();
                closeWishlistModal();
            }
        });

        // 페이지 로딩 완료 시 실행
        document.addEventListener("DOMContentLoaded", () => {
            renderOrders();
            updateProfile();
        });
    </script>

    <!-- 공통 헤더/푸터 스크립트 로드 -->
    <script src="js/common_hyobin.js"></script>
</body>
</html>
