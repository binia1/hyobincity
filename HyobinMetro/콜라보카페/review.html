                    if (s.getAttribute('data-val') <= val) {
                        s.classList.add('active', 'text-yellow-400');
                        s.classList.remove('text-gray-200');
                    } else {
                        s.classList.remove('active', 'text-yellow-400');

        function getReviews() {
            let storedData = JSON.parse(localStorage.getItem(STORAGE_KEY)) || {};

            let defaultReviews = initialReviewsDB[currentStoreId] || [];
            let allReviews = [...userReviews, ...defaultReviews];
            
            const sortType = document.getElementById('sortSelect').value;
            if(sortType === 'high') allReviews.sort((a,b) => b.star - a.star);
            else if(sortType === 'low') allReviews.sort((a,b) => a.star - b.star);
            
            return allReviews;
        }

        window.renderReviews = function() {
            const container = document.getElementById('reviewContainer');
            const reviews = getReviews();
            document.getElementById('reviewCount').textContent = reviews.length;
            container.innerHTML = '';

            reviews.forEach((rev, index) => {
                let starsHtml = '';

                    starsHtml += `<i class="fa-solid fa-star ${i < rev.star ? 'text-yellow-400' : 'text-gray-200'}"></i>`;
                }

                const colors = ['bg-blue-100 text-blue-500', 'bg-green-100 text-green-500', 'bg-purple-100 text-purple-500', 'bg-orange-100 text-orange-500', 'bg-pink-100 text-pink-500'];

                    avatarColor = "bg-gray-800 text-red-500";
                }

                let replyHtml = '';
                if(rev.reply) {
                    replyHtml = `
                    <div class="mt-4 bg-blue-50 border-l-4 border-blue-600 p-4 rounded-r-xl shadow-inner reply-box">
                        <div class="flex items-center gap-2 mb-1">

                        </div>
                        <p class="text-sm text-gray-700 font-bold leading-relaxed">${rev.reply.text}</p>
                    </div>`;
                }

                const html = `
                    <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 review-card ${isVillain ? 'villain-card' : ''}">
                        <div class="flex justify-between items-start mb-3">
                            <div class="flex items-center gap-3">
                                <div class="w-10 h-10 rounded-full ${avatarColor} flex items-center justify-center font-black text-sm">

                                </div>
                                <div>
                                    <div class="flex items-center gap-2 mb-0.5">
                                        <span class="font-black text-gray-800">${rev.author}</span>
                                        <span class="text-xs text-gray-400 font-bold">${rev.date}</span>
                                    </div>
                                    <div class="text-xs">${starsHtml}</div>
                                </div>
                            </div>
                        </div>
                        <div class="ml-[52px]">
                            <p class="text-gray-600 text-sm leading-relaxed bg-gray-50/50 p-3 rounded-xl border border-gray-50">${rev.text}</p>
                            ${replyHtml}
                        </div>
                    </div>
                `;
                container.insertAdjacentHTML('beforeend', html);
            });
        };

        function showToast(message) {
            const toast = document.getElementById('toast');
            document.getElementById('toastMsg').textContent = message;
            toast.classList.remove('toast-hide');
            toast.classList.add('toast-show');
            setTimeout(() => {
                toast.classList.remove('toast-show');
                toast.classList.add('toast-hide');
            }, 3000);
        }

        function submitReview() {
            const text = document.getElementById('reviewText').value;
            const ratingInputVal = document.getElementById('ratingValue').value;
            const rating = parseInt(ratingInputVal);

            if (rating === 0) { showToast("앗! 별점을 먼저 선택해주세요."); return; }
            if (text.trim() === "") { showToast("리뷰 내용을 입력해주세요!"); return; }

            const today = new Date();
            const dateString = `${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}-${String(today.getDate()).padStart(2,'0')}`;

            const newReview = {
                author: "효빈시민_" + Math.floor(Math.random() * 9000 + 1000),
                star: rating,
                date: dateString,
                text: text.replace(/\n/g, "<br>")
            };

            // 🛡️ 빌런 판정 및 욕설 필터링 로직
            if (SECURITY.badPatterns.test(text)) {
                newReview.reply = {
                    author: "효빈교통공사 법무팀",
                    text: "부적절한 언어 사용 및 비하 발언이 감지되었습니다. 본 내용은 데이터 아카이브에 영구 저장되며, 향후 민·형사상 법적 증거로 활용될 수 있음을 엄중히 고지합니다. 건전한 리뷰 문화를 저해하지 마십시오."
                };
            } else if (rating === 1) {
                for (const profile of SECURITY.villainProfiles) {
                    if (profile.keywords.some(key => text.includes(key))) {
                        newReview.reply = profile.response;
                        break;
                    }
                }
            }

            let storedData = JSON.parse(localStorage.getItem(STORAGE_KEY)) || {};
            if (!storedData[currentStoreId]) storedData[currentStoreId] = [];
            storedData[currentStoreId].unshift(newReview);
            localStorage.setItem(STORAGE_KEY, JSON.stringify(storedData));

            document.getElementById('reviewText').value = "";
            document.getElementById('ratingValue').value = "0";
            const starsUI = document.querySelectorAll('.star-rating i');
            starsUI.forEach(s => { s.classList.remove('active', 'text-yellow-400'); s.classList.add('text-gray-200'); });

            document.getElementById('sortSelect').value = 'new';
            renderReviews();
            
            if (newReview.reply) {
                document.getElementById('toast').classList.replace('text-white', 'text-red-100');
                document.querySelector('#toast i').className = "fa-solid fa-triangle-exclamation text-red-500 text-xl mr-3";
                showToast("악성 리뷰가 감지되어 효빈교통공사의 법적/행정적 답변이 등록되었습니다.");
            } else {
                document.getElementById('toast').classList.replace('text-red-100', 'text-white');
                document.querySelector('#toast i').className = "fa-solid fa-check-circle text-green-400 text-xl mr-3";
                showToast("리뷰 등록 완료! (미소하 주임이 통계 데이터로 수집했습니다 📈)");
