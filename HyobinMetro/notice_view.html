    const map = {
      "필독": "bg-red-600",
      "공지": "bg-sky-600",
      "채용": "bg-slate-700",
      "행사": "bg-indigo-600",
      "안전": "bg-emerald-600",
      "입찰": "bg-orange-600",
      "복지": "bg-violet-600",
      "문화": "bg-pink-600",
    };
    b.className = "inline-flex items-center px-3 py-1 rounded-full text-white text-xs font-black " + (map[category] || "bg-sky-600");
    b.innerHTML = '<i class="fa-solid fa-bullhorn mr-2"></i>' + category;
  }

  const id = params.get('id') || 'transfer_discount';
  const item = noticeDB[id];

    document.getElementById('title').textContent = "존재하지 않는 게시물입니다.";
    document.getElementById('lead').textContent = "요청하신 공지 ID를 찾지 못했습니다.";

<script>
  (function() {
    const a = document.getElementById('backToNoticeList');
    if (!a) return;
    try {
      const ref = document.referrer || '';
      if (ref.includes('notice.html')) {
        a.href = ref; // 검색/분류/페이지 유지
      }
    } catch (e) {}
  })();
