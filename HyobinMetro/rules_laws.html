<!DOCTYPE html>
<html lang="ko">
<head>
    <link rel="icon" href="이미지/logo.png">
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>관련 법령 및 사규 - 효빈교통공사</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Noto Sans KR', sans-serif; }
  </style>
</head>
<body id="top" class="bg-slate-50 min-h-screen flex flex-col">
  

  <main class="flex-grow">
    <section class="bg-white border-b border-slate-200">
      <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-10">
        <div class="flex items-start justify-between gap-6 flex-wrap">
          <div>
            <p class="text-xs font-extrabold text-sky-700 tracking-widest">HYOBIN METRO</p>
            <h1 class="text-3xl sm:text-4xl font-black text-slate-900 mt-2">관련 법령 및 사규</h1>
            <p class="text-slate-600 mt-2">서비스 운영과 관련된 법령·사규 정보를 안내합니다.</p>
          </div>
          <a href="index.html" class="inline-flex items-center gap-2 px-4 py-2 rounded-lg bg-slate-900 text-white font-bold hover:bg-slate-800">
            홈으로
            <span aria-hidden="true">→</span>
          </a>
        </div>
      </div>
    </section>

    <section class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-10">
      <div class="bg-white border border-slate-200 rounded-2xl shadow-sm p-6 sm:p-8">
        
<div class="prose max-w-none">
  <p class="text-sm text-slate-500">기준일: 2026-01-10</p>

  <div class="mt-6 grid gap-4">
    <div class="rounded-xl border border-slate-200 bg-slate-50 p-4">
      <p class="font-bold text-slate-900">관련 법령(예시)</p>
      <ul class="list-disc pl-6 mt-2 text-slate-700">
        <li>도시철도 운영 및 안전에 관한 규정(세계관 설정)</li>
        <li>개인정보 보호 관련 규정(공통)</li>
        <li>정보통신망 관련 고시(공통)</li>
      </ul>
      <p class="text-xs text-slate-500 mt-2">※ 실제 법령명/조문 링크는 운영 시 확정하여 게시합니다.</p>
    </div>

    <div class="rounded-xl border border-slate-200 bg-white p-4">
      <p class="font-bold text-slate-900">사규(예시 목록)</p>
      <div class="mt-3 overflow-x-auto">
        <table class="w-full text-sm border border-slate-200">
          <thead class="bg-slate-100">
            <tr>
              <th class="p-2 text-left font-bold text-slate-700">구분</th>
              <th class="p-2 text-left font-bold text-slate-700">명칭</th>
              <th class="p-2 text-left font-bold text-slate-700">비고</th>
            </tr>
          </thead>
          <tbody class="divide-y divide-slate-200">
            <tr><td class="p-2">규정</td><td class="p-2">안전관리 규정</td><td class="p-2 text-slate-500">PDF 예정</td></tr>
            <tr><td class="p-2">지침</td><td class="p-2">역사 시설 점검 지침</td><td class="p-2 text-slate-500">목록화 예정</td></tr>
            <tr><td class="p-2">매뉴얼</td><td class="p-2">비상대응 매뉴얼</td><td class="p-2 text-slate-500">내부자료(비공개)</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>

      </div>
    </section>
  </main>

</body>
</html>
