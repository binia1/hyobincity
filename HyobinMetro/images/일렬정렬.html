<!DOCTYPE html>
<html lang="ko">
<head>
    <link rel="icon" href="이미지/logo.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>효빈도시철도 마스코트 고화질 다운로드</title>
    <!-- html2canvas 라이브러리 로드 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        body {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background-color: #f0f0f0;
            font-family: sans-serif;
        }

        .controls {
            margin-bottom: 20px;
        }

        #download-btn {
            padding: 12px 24px;
            font-size: 16px;
            font-weight: bold;
            background-color: #0077DD; 
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: background 0.3s, transform 0.1s;
        }

        #download-btn:hover {
            background-color: #005BAC;
        }
        
        #download-btn:active {
            transform: scale(0.98);
        }

        #character-container {
            display: flex;
            flex-direction: row;
            flex-wrap: nowrap;
            align-items: flex-end; 
            gap: 5px;
            padding: 20px;
            background-color: white; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            border-radius: 10px;
        }

        .character-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        .character-wrapper img {
            height: 400px;
            width: auto;
            display: block;
        }

        .wiki-line-icon {
            display: inline-flex;
            justify-content: center;
            align-items: center;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background-color: #fff;
            text-decoration: none !important;
            font-weight: bold;
            font-size: 14px;
            box-sizing: border-box;
            vertical-align: middle;
        }
    </style>
</head>
<body>

    <div class="controls">
        <button id="download-btn">고화질(뱃지 포함) 전체 이미지 다운로드</button>
    </div>

    <div id="character-container">
        <!-- 1호선 -->
        <div class="character-wrapper">
            <img src="고나미.png" alt="고나미">
            <span class="wiki-line-icon" style="border: 2px solid #0077DD; color: #0077DD;">1</span>
        </div>
        <!-- 2호선 -->
        <div class="character-wrapper">
            <img src="하루빈.png" alt="하루빈">
            <span class="wiki-line-icon" style="border: 2px solid #00CCAA; color: #00CCAA;">2</span>
        </div>
        <!-- 3호선 -->
        <div class="character-wrapper">
            <img src="박라미.png" alt="박라미">
            <span class="wiki-line-icon" style="border: 2px solid #FFCC11; color: #FFCC11;">3</span>
        </div>
        <!-- 4호선 -->
        <div class="character-wrapper">
            <img src="다로나.png" alt="다로나">
            <span class="wiki-line-icon" style="border: 2px solid #FF5522; color: #FF5522;">4</span>
        </div>
        <!-- 5호선 -->
        <div class="character-wrapper">
            <img src="미소하.png" alt="미소하">
            <span class="wiki-line-icon" style="border: 2px solid #EE0022; color: #EE0022;">5</span>
        </div>
        <!-- 6호선 -->
        <div class="character-wrapper">
            <img src="라세나.png" alt="라세나">
            <span class="wiki-line-icon" style="border: 2px solid #881188; color: #881188;">6</span>
        </div>
        <!-- 7호선 -->
        <div class="character-wrapper">
            <img src="임세정.png" alt="임세정">
            <span class="wiki-line-icon" style="border: 2px solid #FF8899; color: #FF8899;">7</span>
        </div>
        <!-- 7호선 -->
        <div class="character-wrapper">
            <img src="임세하.png" alt="임세하">
            <span class="wiki-line-icon" style="border: 2px solid #FF8899; color: #FF8899;">7</span>
        </div>
        <!-- 8호선 -->
        <div class="character-wrapper">
            <img src="유리아.png" alt="유리아">
            <span class="wiki-line-icon" style="border: 2px solid #9856FF; color: #9856FF;">8</span>
        </div>
        <!-- 빈효선 -->
        <div class="character-wrapper">
            <img src="전노아.png" alt="전노아">
            <span class="wiki-line-icon" style="border: 2px solid #6677CC; color: #6677CC; font-size: 13px;">빈</span>
        </div>
    </div>

    <script>
        document.getElementById('download-btn').addEventListener('click', function() {
            const captureTarget = document.getElementById('character-container');
            
            const btn = this;
            const originalText = btn.innerText;
            btn.innerText = "고화질 렌더링 중...";
            btn.disabled = true;

            // html2canvas 해상도 향상 옵션 적용
            html2canvas(captureTarget, {
                useCORS: true,
                backgroundColor: "#ffffff", // 배경색 강제 지정
                scale: 3 // ★ 캡처 해상도를 3배로 증가시켜 화질 깨짐 방지 ★
            }).then(function(canvas) {
                try {
                    const imgData = canvas.toDataURL('image/png', 1.0); // 품질 100%
                    
                    const link = document.createElement('a');
                    link.download = '효빈도시철도_마스코트_고화질.png';
                    link.href = imgData;
                    link.click();
                } catch (e) {
                    alert("로컬 환경(file://)에서는 보안 정책으로 인해 다운로드가 제한될 수 있습니다.\n웹 서버 환경에서 실행해 주세요.");
                    console.error(e);
                } finally {
                    btn.innerText = originalText;
                    btn.disabled = false;
                }
            });
        });
    </script>
</body>
</html>
