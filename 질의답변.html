                a: "자정(00:00)부터 새벽 04:00까지 운행하며, 대학가 및 구도심, 신규 주거 밀집 지역을 교차 연결하는 4개 노선(N1, N2, N3, N4)이 있습니다. 버스 내 고화질 CCTV 설치 및 '안심 귀가 스카우트' 연계를 통해 자택 앞까지 도보 동행 지원을 받으실 수 있습니다."
            },
            {
                id: 27,
                category: "문화/관광",
                q: "HAF(효빈 애니메이션 페스티벌) 기간 중 대중교통 이용 관련 지원이 있나요?",
                a: "HAF 행사 기간 동안 전 세계 관광객의 이동 편의를 위해 도시철도 및 주요 간선버스의 주말 배차 간격을 평일 출퇴근 수준으로 대폭 단축하여 증회 운행합니다.<br>아울러 효빈역, 효빈종합터미널 등 주요 관문과 HAF 핵심 행사장을 직통으로 잇는 임시 셔틀버스(T-Special) 라인을 무료로 투입하여 교통 혼잡을 방지하고 있습니다."
            }
        ];

        let activeCategory = 'all';
        let currentKeyword = '';
        let currentPage = 1;
        const itemsPerPage = 8; // 한 페이지당 8개 표시
        let currentFilteredData = [];

        // 카테고리 뱃지 색상 매핑
        const categoryColors = {
            '교통': 'bg-blue-100 text-blue-700',
            '청년/복지': 'bg-green-100 text-green-700',
            '문화/관광': 'bg-purple-100 text-purple-700',
            '행정/일반': 'bg-slate-200 text-slate-700'
        };

        // 초기화
        document.addEventListener('DOMContentLoaded', () => {
            filterFAQs(); 
            setupFilterButtons();
        });

        // 필터 버튼 이벤트 셋업
        function setupFilterButtons() {
            const buttons = document.querySelectorAll('.filter-btn');
            buttons.forEach(btn => {
                btn.addEventListener('click', (e) => {
                    // 활성 상태 스타일 변경
                    buttons.forEach(b => {
                        b.classList.remove('bg-hyobin-dark', 'text-white');
                        b.classList.add('bg-white', 'text-slate-600', 'border-slate-300');
                    });
                    e.target.classList.remove('bg-white', 'text-slate-600', 'border-slate-300');
                    e.target.classList.add('bg-hyobin-dark', 'text-white');
                    
                    activeCategory = e.target.dataset.category;
                    filterFAQs(); 
                });
            });
        }

        // 검색 및 필터링 적용 로직
        function filterFAQs() {
            currentKeyword = document.getElementById('search-input').value.toLowerCase();
            
            // 전체 데이터 필터링
            currentFilteredData = faqData.filter(item => {
                const matchCategory = activeCategory === 'all' || item.category === activeCategory;
                const matchKeyword = item.q.toLowerCase().includes(currentKeyword) || item.a.toLowerCase().includes(currentKeyword);
                return matchCategory && matchKeyword;
            });

            currentPage = 1; 
            renderFAQs();
        }

        // FAQ 목록 렌더링 (페이지네이션 적용)
        function renderFAQs() {
            const container = document.getElementById('faq-container');
            container.innerHTML = '';

            if (currentFilteredData.length === 0) {
                container.innerHTML = `<div class="p-10 text-center text-slate-500 font-medium bg-white">해당 조건에 맞는 질의응답이 없습니다.</div>`;
                renderPagination();
                return;
            }

            // 페이지 데이터 슬라이싱
            const startIndex = (currentPage - 1) * itemsPerPage;
            const endIndex = startIndex + itemsPerPage;
            const pageData = currentFilteredData.slice(startIndex, endIndex);

            pageData.forEach(item => {
                const badgeClass = categoryColors[item.category] || 'bg-slate-200 text-slate-700';
                
                const faqHTML = `
                    <div class="faq-item group">
                        <div class="faq-question p-5 flex items-center justify-between" onclick="toggleFAQ(this)">
                            <div class="flex items-center gap-4 flex-1 pr-4">
                                <span class="badge-category ${badgeClass}">${item.category}</span>
                                <h4 class="font-bold text-slate-800 text-[15.5px] leading-snug group-hover:text-hyobin-blue transition"><span class="text-hyobin-blue font-black mr-1">Q.</span> ${item.q}</h4>
                            </div>
                            <div class="faq-icon text-slate-400 transition-transform duration-300 flex-shrink-0">
                                <i data-lucide="chevron-down" class="w-5 h-5"></i>
                            </div>
                        </div>
                        <div class="faq-answer border-t border-slate-100">
                            <div class="p-6 text-slate-700 leading-relaxed text-[15px] pl-[100px] relative">
                                <span class="absolute left-6 top-6 text-red-500 font-black text-lg">A.</span>
                                ${item.a}
                            </div>
                        </div>
                    </div>
                `;
                container.insertAdjacentHTML('beforeend', faqHTML);
            });

            if (typeof lucide !== 'undefined') lucide.createIcons();
            renderPagination(); 
        }

        // 아코디언 토글 로직
        window.toggleFAQ = function(element) {
            const parent = element.parentElement;
            
            // 기존 열려있는 아코디언 닫기 (하나만 열리게 작동)
            document.querySelectorAll('.faq-item').forEach(item => {
                if(item !== parent) item.classList.remove('active');
            });
            
            parent.classList.toggle('active');
        }

        // 페이지네이션 렌더링 로직
        function renderPagination() {
            const container = document.getElementById('pagination-container');
            container.innerHTML = '';
            
            const totalPages = Math.ceil(currentFilteredData.length / itemsPerPage);
            if (totalPages <= 1) return; // 1페이지 이하면 버튼 숨김

            const nav = document.createElement('nav');
            nav.className = "flex items-center gap-1.5";

            // 버튼 생성 헬퍼
            const createBtn = (text, targetPage, isDisabled, isActive) => {
                const btn = document.createElement('button');
                btn.innerHTML = text;
                btn.disabled = isDisabled;
                
                if (isActive) {
                    btn.className = 'w-9 h-9 rounded bg-hyobin-dark text-white font-bold flex items-center justify-center shadow-md';
                } else if (isDisabled) {
                    btn.className = 'w-9 h-9 rounded border border-slate-200 text-slate-300 bg-slate-50 flex items-center justify-center cursor-not-allowed';
                } else {
                    btn.className = 'w-9 h-9 rounded border border-slate-200 bg-white hover:bg-slate-100 text-slate-600 flex items-center justify-center transition font-medium';
                }
                
                if (!isDisabled) {
                    btn.onclick = () => {
                        currentPage = targetPage;
                        renderFAQs();
                        document.getElementById('faq-container').scrollIntoView({ behavior: 'smooth', block: 'start' });
                    };
                }
                return btn;
            };

            nav.appendChild(createBtn('<i data-lucide="chevron-left" class="w-4 h-4"></i>', currentPage - 1, currentPage === 1, false));
            for (let i = 1; i <= totalPages; i++) {
                nav.appendChild(createBtn(i, i, false, i === currentPage));
            }
            nav.appendChild(createBtn('<i data-lucide="chevron-right" class="w-4 h-4"></i>', currentPage + 1, currentPage === totalPages, false));

            container.appendChild(nav);
            if (typeof lucide !== 'undefined') lucide.createIcons();
        }
    </script>

    <!-- 필수 스크립트 로드 (지침 준수) -->
    <script src="data.js"></script>
    <script src="script.js"></script>
    <script src="common121.js"></script>
</body>
</html>
